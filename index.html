<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Miri Shop - Calculadora</title>

<link rel="manifest" href="manifest-miri.json">
<meta name="theme-color" content="#ff4fb3">
<link rel="apple-touch-icon" href="icon-512-miri.png">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#ffc5e6 0%,#ff4fb3 50%,#111111 100%);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:430px;
background:white;
border-radius:30px;
padding:25px;
border:4px solid #ff9bd8;
box-shadow:0 0 20px rgba(255,20,147,.35);
}

.center{
text-align:center;
}

.logo img{
width:100%;
max-width:250px;
display:block;
margin:auto;
}

.titulo{
font-size:26px;
font-weight:bold;
margin-top:10px;
}

.numero{
margin-top:6px;
font-weight:bold;
}

.subtitulo{
margin-top:6px;
font-weight:bold;
color:#b83280;
}

.badge{
display:inline-block;
background:#ffd6ec;
padding:8px 15px;
border-radius:20px;
margin-top:10px;
font-weight:bold;
color:#db2777;
}

h2{
text-align:center;
margin-top:20px;
}

.field{
margin-top:14px;
}

label{
font-weight:bold;
color:#ff1493;
display:block;
margin-bottom:6px;
}

input{
width:100%;
padding:15px;
border-radius:20px;
border:3px solid #ffc2e5;
background:#fff0f8;
font-size:16px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:30px;
margin-top:15px;
font-size:17px;
font-weight:bold;
color:white;
cursor:pointer;
background:linear-gradient(90deg,#ff6aa9,#ff1493,#000);
}

.result{
margin-top:20px;
padding:18px;
border-radius:20px;
background:#fff0f8;
border:3px solid #ffc2e5;
}

.result-main{
text-align:center;
font-size:26px;
font-weight:bold;
}

.result-main span{
color:#ff1493;
}

</style>

</head>

<body>

<div class="card">

<div class="center">

<div class="logo">
<img src="miri.jpg">
</div>

<div class="titulo">
MIRI SHOP
</div>

<div class="numero">
📱 +52 744 000 0000
</div>

<div class="subtitulo">
Calculadora de reembolsos
</div>

<div class="badge">
Bonita, rápida y fácil
</div>

</div>

<h2>Resultado</h2>

<div class="field">
<label>Precio del servicio</label>
<input id="precio" type="number" placeholder="Ejemplo: 18">
</div>

<div class="field">
<label>Tiempo contratado (días)</label>
<input id="plan" type="number" placeholder="Ejemplo: 30">
</div>

<div class="field">
<label>Días de garantía</label>
<input id="garantia" type="number" placeholder="Ejemplo: 7">
</div>

<div class="field">
<label>Fecha de entrega</label>
<input id="entrega" type="date">
</div>

<div class="field">
<label>Fecha de caída</label>
<input id="caida" type="date">
</div>

<button onclick="calcular()">Calcular reembolso</button>

<div class="result">

<div class="result-main">
Reembolso: <span id="reembolso">$0.00</span>
</div>

<div id="detalle"></div>

</div>

</div>

<script>

function dias(a,b){
const inicio=new Date(a)
const fin=new Date(b)
return Math.floor((fin-inicio)/(1000*60*60*24))
}

function calcular(){

const precio=parseFloat(document.getElementById("precio").value)
const plan=parseInt(document.getElementById("plan").value)
const garantia=parseInt(document.getElementById("garantia").value)
const entrega=document.getElementById("entrega").value
const caida=document.getElementById("caida").value

if(!precio||!plan||!garantia||!entrega||!caida){
alert("Completa todos los campos")
return
}

const usados=dias(entrega,caida)
const valorDia=precio/plan

let faltantes=0
let reembolso=0

if(usados<garantia){
faltantes=garantia-usados
reembolso=valorDia*faltantes
}

document.getElementById("reembolso").innerHTML="$"+reembolso.toFixed(2)

document.getElementById("detalle").innerHTML=
"Días usados: "+usados+"<br>"+
"Días garantía: "+garantia+"<br>"+
"Días faltantes garantía: "+faltantes+"<br>"+
"Valor por día: $"+valorDia.toFixed(2)

}

</script>

</body>
</html>
