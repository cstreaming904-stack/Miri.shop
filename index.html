<!DOCTYPE html>
<html lang="es">

<head>

<link rel="manifest" href="manifest.json">

<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js");
}
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Miri Shop - Calculadora de Reembolsos</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:radial-gradient(circle at top,#ffe4f1,#ffd6ec 35%,#f8efff 100%);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:24px;
}

/* CARD */

.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.95);
border:4px solid #f9c2dd;
border-radius:32px;
box-shadow:0 18px 40px rgba(200,100,160,0.18);
padding:24px;
}

.center{text-align:center;}

.emoji{font-size:42px;margin-bottom:6px;}

h1{
margin:0;
color:#ec4899;
font-size:30px;
font-weight:800;
}

.subtitle{
margin-top:8px;
color:#d946ef;
font-weight:600;
font-size:16px;
}

.title2{
margin-top:16px;
color:#374151;
font-size:28px;
font-weight:800;
}

/* INPUT */

.field{margin-top:14px;}

label{
display:block;
color:#ec4899;
font-size:14px;
font-weight:700;
margin-bottom:8px;
}

input{
width:100%;
border:2px solid #f9c2dd;
background:#fff1f7;
border-radius:18px;
padding:14px 16px;
font-size:18px;
outline:none;
}

input:focus{
border-color:#ec4899;
box-shadow:0 0 4px rgba(236,72,153,0.2);
}

/* BOTON */

button{
width:100%;
margin-top:18px;
border:0;
border-radius:18px;
padding:15px;
font-size:20px;
font-weight:800;
color:white;
cursor:pointer;
background:linear-gradient(90deg,#fb7185,#ec4899);
box-shadow:0 10px 24px rgba(217,70,239,0.25);
}

/* RESULTADO */

.result{
margin-top:20px;
padding:16px;
border-radius:20px;
background:#fff0f7;
border:2px solid #fbcfe8;
}

.result span{
font-size:22px;
font-weight:800;
color:#ec4899;
}

/* SPLASH SCREEN */

#splash-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(180deg,#fff0f7,#ffe4f1);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.splash-content{
text-align:center;
}

.splash-logo{
width:110px;
height:110px;
border-radius:26px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
margin-bottom:14px;
}

.splash-content h1{
margin:0;
font-size:32px;
color:#ec4899;
font-weight:800;
}

.splash-content p{
margin-top:8px;
color:#7a4b63;
font-size:16px;
}

</style>

</head>

<body>

<!-- SPLASH SCREEN -->

<div id="splash-screen">
<div class="splash-content">
<img src="icon-192.jpg" class="splash-logo">
<h1>Miri Shop</h1>
<p>Cargando...</p>
</div>
</div>

<!-- APP -->

<div class="card">

<div class="center">
<div class="emoji">💖</div>
<h1>MIRI SHOP</h1>
<div class="subtitle">Calculadora de Reembolsos</div>
</div>

<div class="title2 center">Resultado</div>

<div class="field">
<label>Precio del servicio</label>
<input id="precio" type="number">
</div>

<div class="field">
<label>Días del plan</label>
<input id="diasplan" type="number">
</div>

<div class="field">
<label>Días usados</label>
<input id="diasusados" type="number">
</div>

<button onclick="calcular()">Calcular reembolso</button>

<div class="result center">
Reembolso: <span id="resultado">$0</span>
</div>

</div>

<script>

function calcular(){

let precio=document.getElementById("precio").value;
let diasplan=document.getElementById("diasplan").value;
let diasusados=document.getElementById("diasusados").value;

precio=parseFloat(precio);
diasplan=parseFloat(diasplan);
diasusados=parseFloat(diasusados);

if(!precio||!diasplan||!diasusados){
alert("Completa todos los campos");
return;
}

let valorDia=precio/diasplan;
let diasRestantes=diasplan-diasusados;
let reembolso=valorDia*diasRestantes;

document.getElementById("resultado").innerText="$"+reembolso.toFixed(2);

}

/* SPLASH ANIMATION */

window.addEventListener("load",function(){

setTimeout(function(){

let splash=document.getElementById("splash-screen");

splash.style.opacity="0";
splash.style.transition="opacity 0.5s";

setTimeout(function(){

splash.style.display="none";

},500);

},1200);

});

</script>

</body>
  </html>
