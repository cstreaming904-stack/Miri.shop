<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Miri Shop - Calculadora</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
margin:0;
background:radial-gradient(circle at top,#f7efff 0%,#f3e8ff 25%,#fce7f3 55%,#e0f2fe 85%,#ffffff 100%);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:22px;
overflow-x:hidden;
}

/* TARJETA */

.card{
width:100%;
max-width:450px;
background:white;
border-radius:34px;
padding:24px;
box-shadow:0 20px 40px rgba(168,85,247,.18);
}

/* CORONA */

.emoji{
font-size:42px;
display:inline-block;
animation:crownFloat 3s ease-in-out infinite;
position:relative;
}

.emoji::before,
.emoji::after{
content:"✦";
position:absolute;
color:white;
font-size:14px;
animation:twinkle 2s infinite;
}

.emoji::before{
left:-12px;
top:4px;
}

.emoji::after{
right:-12px;
top:-4px;
animation-delay:1s;
}

@keyframes crownFloat{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-6px)}
}

@keyframes twinkle{
0%,100%{opacity:.2;transform:scale(.7)}
50%{opacity:1;transform:scale(1.3)}
}

/* LOGO */

.logo{
position:relative;
display:inline-block;
margin-top:8px;
}

.logo img{
width:220px;
animation:floatLogo 4s ease-in-out infinite;
}

@keyframes floatLogo{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

/* BRILLO LOGO */

.logo::after{
content:"";
position:absolute;
top:0;
left:-120%;
width:60%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.8),transparent);
transform:skewX(-20deg);
animation:shineLogo 4s infinite;
}

@keyframes shineLogo{
0%{left:-120%}
50%{left:160%}
100%{left:160%}
}

/* TITULOS */

h1{
color:#c026d3;
margin:6px 0;
font-size:30px;
text-align:center;
}

.phone{
text-align:center;
font-weight:700;
color:#7c3aed;
}

.subtitle{
text-align:center;
color:#8b5cf6;
font-weight:700;
margin-top:4px;
}

.badge{
margin:auto;
margin-top:10px;
background:linear-gradient(90deg,#f5d0fe,#e9d5ff,#dbeafe);
width:max-content;
padding:7px 14px;
border-radius:999px;
font-weight:700;
color:#9333ea;
}

/* INPUTS */

.field{
margin-top:14px;
}

label{
color:#c026d3;
font-weight:700;
}

input{
width:100%;
padding:14px;
border-radius:18px;
border:3px solid #e9d5ff;
margin-top:6px;
font-size:16px;
}

.date-box{
position:relative;
}

.icono{
position:absolute;
right:14px;
top:50%;
transform:translateY(-50%);
}

/* BOTONES */

.btn{
width:100%;
margin-top:16px;
padding:16px;
border:none;
border-radius:24px;
font-size:18px;
font-weight:900;
color:white;
cursor:pointer;
position:relative;
overflow:hidden;
}

.btn::after{
content:"";
position:absolute;
top:0;
left:-120%;
width:50%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
transform:skewX(-20deg);
animation:shine 3s infinite;
}

@keyframes shine{
0%{left:-120%}
50%{left:160%}
100%{left:160%}
}

.btn-primary{
background:linear-gradient(90deg,#60a5fa,#a855f7,#ec4899);
}

.btn-whatsapp{
background:linear-gradient(90deg,#8b5cf6,#c026d3,#ec4899);
}

.btn-copy{
background:linear-gradient(90deg,#93c5fd,#c4b5fd,#f9a8d4);
}

/* RESULTADO */

.result{
margin-top:20px;
padding:16px;
border-radius:22px;
background:#faf5ff;
border:3px solid #e9d5ff;
}

.result-main{
font-size:20px;
font-weight:900;
text-align:center;
}

.result-main span{
color:#c026d3;
font-size:26px;
}

.details,.mini-msg{
margin-top:12px;
background:white;
padding:12px;
border-radius:14px;
white-space:pre-line;
}

/* CONFETI */

.confetti{
position:fixed;
width:10px;
height:10px;
background:#f472b6;
animation:fall 3s linear forwards;
}

@keyframes fall{
0%{transform:translateY(-20px)}
100%{transform:translateY(110vh)}
}

/* SPLASH */

#splash{
position:fixed;
inset:0;
background:white;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
flex-direction:column;
}

.splash-logo{
width:120px;
border-radius:26px;
animation:floatLogo 3s infinite;
}

</style>
</head>

<body>

<div id="splash">

<img src="miri-splash.png" class="splash-logo" onerror="this.style.display='none'">

<h2>Cargando...</h2>

</div>

<div class="card">

<div style="text-align:center">

<div class="emoji">👑</div>

<div class="logo">
<img src="logo-miri.png" onerror="this.style.display='none'">
</div>

<h1>MIRI SHOP</h1>

<div class="phone">📱 +52 981 196 8561</div>

<div class="subtitle">Calculadora de reembolsos</div>

<div class="badge">🫧 Bonita, rápida y fácil 🫧</div>

</div>

<div class="field">
<label>Precio del servicio</label>
<input id="precio" type="number">
</div>

<div class="field">
<label>Tiempo contratado (días)</label>
<input id="tiempoContratado" type="number">
</div>

<div class="field">
<label>Días de garantía</label>
<input id="diasGarantia" type="number">
</div>

<div class="field">
<label>Fecha de entrega</label>

<div class="date-box">
<input id="fechaEntrega" type="date">
<span class="icono">📅</span>
</div>

</div>

<div class="field">
<label>Fecha de caída</label>

<div class="date-box">
<input id="fechaCaida" type="date">
<span class="icono">📅</span>
</div>

</div>

<button class="btn btn-primary" onclick="calcularReembolso()">Calcular reembolso 💞</button>

<button class="btn btn-whatsapp" onclick="enviarWhatsApp()">Enviar cálculo al cliente 💬</button>

<button class="btn btn-copy" onclick="copiarMensaje()">Copiar resultado 📋</button>

<div class="result">

<div class="result-main">
Reembolso: <span id="resultado">$0.00</span>
</div>

<div class="details" id="detalleResultado">
Aquí aparecerá el detalle del cálculo.
</div>

<div class="mini-msg" id="mensajeCompartir">
Primero calcula el reembolso.
</div>

</div>

</div>

<script>

/* SPLASH */

window.onload=()=>{
setTimeout(()=>{
document.getElementById("splash").style.display="none"
},1200)
}

function diferenciaDias(i,f){
return Math.floor((new Date(f)-new Date(i))/(1000*60*60*24))
}

function formatearFecha(f){
return new Date(f).toLocaleDateString("es-MX")
}

function calcularReembolso(){

let precio=parseFloat(precio.value)
let plan=parseInt(tiempoContratado.value)
let garantia=parseInt(diasGarantia.value)
let entrega=fechaEntrega.value
let caida=fechaCaida.value

if(!precio||!plan||!garantia||!entrega||!caida){
alert("Completa todos los campos 💖")
return
}

let usados=diferenciaDias(entrega,caida)
let valorDia=precio/plan
let faltantes=0
let reembolso=0

if(usados<garantia){
faltantes=garantia-usados
reembolso=valorDia*faltantes
confeti()
}

resultado.textContent="$"+reembolso.toFixed(2)

detalleResultado.textContent=
"Días usados: "+usados+"\n"+
"Días garantía: "+garantia+"\n"+
"Días faltantes garantía: "+faltantes+"\n"+
"Valor por día: $"+valorDia.toFixed(2)

mensajeCompartir.textContent=
"Hola 🌸\n"+
"Este es tu cálculo de reembolso en Miri Shop:\n\n"+
"Precio: $"+precio+"\n"+
"Plan: "+plan+" días\n"+
"Garantía: "+garantia+" días\n"+
"Entrega: "+formatearFecha(entrega)+"\n"+
"Caída: "+formatearFecha(caida)+"\n"+
"Reembolso: $"+reembolso.toFixed(2)+"\n\n"+
"Este reembolso puede utilizarse como saldo a favor en tu próxima renovación o compra en Miri Shop 💖\n\n"+
"Gracias por comprar en Miri Shop 💖"

}

function enviarWhatsApp(){
let msg=encodeURIComponent(mensajeCompartir.textContent)
window.open("https://wa.me/?text="+msg)
}

function copiarMensaje(){
navigator.clipboard.writeText(mensajeCompartir.textContent)
alert("Copiado 💖")
}

function confeti(){

for(let i=0;i<60;i++){

let c=document.createElement("div")

c.className="confetti"

c.style.left=Math.random()*100+"vw"

c.style.background=["#f472b6","#ec4899","#a78bfa","#93c5fd"][Math.floor(Math.random()*4)]

c.style.animationDuration=2+Math.random()*2+"s"

document.body.appendChild(c)

setTimeout(()=>c.remove(),4000)

}

}

</script>

</body>
</html>
