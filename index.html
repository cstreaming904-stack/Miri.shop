<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="manifest" href="manifest.json">

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miri Shop - Calculadora de Reembolsos</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #ffe4f1, #ffd6ec 35%, #f8efff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.95);
      border: 4px solid #f9c2dd;
      border-radius: 32px;
      box-shadow: 0 18px 40px rgba(200,100,160,0.18);
      padding: 24px;
    }

    .center { text-align: center; }

    .emoji {
      font-size: 42px;
      margin-bottom: 6px;
    }

    h1 {
      margin: 0;
      color: #ec4899;
      font-size: 30px;
      font-weight: 800;
    }

    .subtitle {
      margin-top: 8px;
      color: #d946ef;
      font-weight: 600;
      font-size: 16px;
    }

    .title2 {
      margin-top: 16px;
      color: #374151;
      font-size: 28px;
      font-weight: 800;
    }

    .field {
      margin-top: 14px;
    }

    label {
      display: block;
      color: #ec4899;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      border: 2px solid #f9c2dd;
      background: #fff1f7;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 18px;
      outline: none;
    }

    input:focus {
      border-color: #ec4899;
      box-shadow: 0 0 4px rgba(236,72,153,0.2);
    }

    button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 18px;
      padding: 15px;
      font-size: 20px;
      font-weight: 800;
      color: white;
      cursor: pointer;
      background: linear-gradient(90deg,#fb7185,#ec4899);
      box-shadow: 0 10px 24px rgba(217,70,239,0.25);
    }

    .result {
      margin-top: 20px;
      padding: 16px;
      border-radius: 20px;
      background: #fff0f7;
      border: 2px solid #fbcfe8;
      text-align: center;
    }

    .result-main {
      font-size: 20px;
      font-weight: 700;
      color: #374151;
    }

    .result-main span {
      color: #ec4899;
      font-size: 24px;
      font-weight: 800;
    }

    .details {
      margin-top: 12px;
      text-align: left;
      font-size: 14px;
      color: #4b5563;
      line-height: 1.6;
      white-space: pre-line;
    }

    .status {
      margin-top: 10px;
      font-weight: 700;
      color: #d946ef;
      text-align: center;
    }

    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg,#fff0f7,#ffe4f1);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .splash-content {
      text-align: center;
    }

    .splash-logo {
      width: 110px;
      height: 110px;
      border-radius: 26px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      margin-bottom: 14px;
    }

    .splash-content h1 {
      margin: 0;
      font-size: 32px;
      color: #ec4899;
      font-weight: 800;
    }

    .splash-content p {
      margin-top: 8px;
      color: #7a4b63;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="splash-screen">
    <div class="splash-content">
      <img src="icon-192.jpg" alt="Miri Shop" class="splash-logo">
      <h1>Miri Shop</h1>
      <p>Cargando...</p>
    </div>
  </div>

  <div class="card">
    <div class="center">
      <div class="emoji">💖</div>
      <h1>MIRI SHOP</h1>
      <div class="subtitle">Calculadora de Reembolsos</div>
    </div>

    <div class="title2 center">Resultado</div>

    <div class="field">
      <label for="precio">Precio del servicio</label>
      <input id="precio" type="number" placeholder="Ejemplo: 18">
    </div>

    <div class="field">
      <label for="tiempoContratado">Tiempo contratado (días)</label>
      <input id="tiempoContratado" type="number" placeholder="Ejemplo: 30">
    </div>

    <div class="field">
      <label for="diasGarantia">Días de garantía</label>
      <input id="diasGarantia" type="number" placeholder="Ejemplo: 7">
    </div>

    <div class="field">
      <label for="fechaEntrega">Fecha de entrega</label>
      <input id="fechaEntrega" type="date">
    </div>

    <div class="field">
      <label for="fechaCaida">Fecha de caída</label>
      <input id="fechaCaida" type="date">
    </div>

    <button onclick="calcularReembolso()">Calcular reembolso</button>

    <div class="result">
      <div class="result-main">
        Reembolso: <span id="resultado">$0.00</span>
      </div>
      <div class="status" id="estadoGarantia"></div>
      <div class="details" id="detalleResultado"></div>
    </div>
  </div>

  <script>
    function diferenciaDias(fechaInicio, fechaFin) {
      const inicio = new Date(fechaInicio + "T00:00:00");
      const fin = new Date(fechaFin + "T00:00:00");
      const msPorDia = 1000 * 60 * 60 * 24;
      return Math.floor((fin - inicio) / msPorDia);
    }

    function calcularReembolso() {
      const precio = parseFloat(document.getElementById("precio").value);
      const tiempoContratado = parseInt(document.getElementById("tiempoContratado").value, 10);
      const diasGarantia = parseInt(document.getElementById("diasGarantia").value, 10);
      const fechaEntrega = document.getElementById("fechaEntrega").value;
      const fechaCaida = document.getElementById("fechaCaida").value;

      const resultado = document.getElementById("resultado");
      const detalle = document.getElementById("detalleResultado");
      const estado = document.getElementById("estadoGarantia");

      if (
        isNaN(precio) ||
        isNaN(tiempoContratado) ||
        isNaN(diasGarantia) ||
        !fechaEntrega ||
        !fechaCaida
      ) {
        alert("Completa todos los campos.");
        return;
      }

      if (tiempoContratado <= 0 || diasGarantia <= 0) {
        alert("Los días deben ser mayores a 0.");
        return;
      }

      if (diasGarantia > tiempoContratado) {
        alert("Los días de garantía no pueden ser mayores al tiempo contratado.");
        return;
      }

      const diasUsados = diferenciaDias(fechaEntrega, fechaCaida);

      if (diasUsados < 0) {
        alert("La fecha de caída no puede ser anterior a la fecha de entrega.");
        return;
      }

      const valorPorDia = precio / tiempoContratado;
      let diasFaltantesGarantia = 0;
      let reembolso = 0;

      if (diasUsados < diasGarantia) {
        diasFaltantesGarantia = diasGarantia - diasUsados;
        reembolso = valorPorDia * diasFaltantesGarantia;
        estado.textContent = "Cayó dentro de garantía";
      } else {
        diasFaltantesGarantia = 0;
        reembolso = 0;
        estado.textContent = "Fuera de garantía";
      }

      resultado.textContent = "$" + reembolso.toFixed(2);

      detalle.textContent =
        "Días usados: " + diasUsados + "\n" +
        "Días de garantía: " + diasGarantia + "\n" +
        "Días faltantes por cubrir garantía: " + diasFaltantesGarantia + "\n" +
        "Valor por día: $" + valorPorDia.toFixed(2);
    }

    window.addEventListener("load", function() {
      setTimeout(function() {
        const splash = document.getElementById("splash-screen");
        splash.style.opacity = "0";
        splash.style.transition = "opacity 0.5s";
        setTimeout(function() {
          splash.style.display = "none";
        }, 500);
      }, 1200);
    });
  </script>
</body>
        </html>
