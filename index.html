<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="manifest" href="manifest.json">

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIRI SHOP - Calculadora de Reembolso</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #ffe4f1, #ffd6ec 35%, #fde2ff 70%, #f8e8ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.93);
      border: 4px solid #f9c2dd;
      border-radius: 32px;
      box-shadow: 0 18px 40px rgba(200, 100, 160, 0.18);
      padding: 24px;
    }
    .center { text-align: center; }
    .emoji { font-size: 42px; margin-bottom: 6px; }
    h1 {
      margin: 0;
      color: #ec4899;
      font-size: 32px;
      font-weight: 800;
    }
    .subtitle {
      margin-top: 8px;
      color: #d946ef;
      font-weight: 600;
      font-size: 16px;
    }
    .title2 {
      margin-top: 16px;
      color: #374151;
      font-size: 28px;
      font-weight: 800;
      line-height: 1.2;
    }
    .field { margin-top: 14px; }
    label {
      display: block;
      color: #ec4899;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      border: 2px solid #f9c2dd;
      background: #fff1f7;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: #ec4899;
      box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.15);
    }
    button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 18px;
      padding: 15px;
      font-size: 20px;
      font-weight: 800;
      color: white;
      cursor: pointer;
      background: linear-gradient(90deg, #fb7185, #d946ef);
      box-shadow: 0 10px 24px rgba(217, 70, 239, 0.25);
    }
    button:hover { transform: scale(1.02); }
    .result, .error {
      margin-top: 20px;
      border-radius: 24px;
      padding: 18px;
      text-align: center;
    }
    .result {
      background: #fff1f7;
      border: 2px solid #f9c2dd;
    }
    .error {
      background: #fff1f2;
      border: 2px solid #fecdd3;
      color: #e11d48;
      font-weight: 700;
    }
    .muted { color: #6b7280; margin: 6px 0; }
    .refund {
      color: #d946ef;
      font-size: 38px;
      font-weight: 900;
      margin-top: 14px;
    }
    .tiny {
      color: #f472b6;
      font-size: 13px;
      font-weight: 700;
      margin-top: 8px;
    }
    .note {
      margin-top: 14px;
      font-size: 12px;
      color: #6b7280;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="center">
      <div class="emoji">🎀✨</div>
      <h1>MIRI SHOP</h1>
      <div class="subtitle">Calculadora kawaii de reembolso</div>
      <div class="title2">Reembolso de<br>streaming</div>
    </div>

    <div class="field">
      <label for="precio">Precio del servicio</label>
      <input type="number" id="precio" placeholder="Ejemplo: 18" step="0.01" value="18">
    </div>

    <div class="field">
      <label for="fechaCompra">Fecha de compra</label>
      <input type="date" id="fechaCompra">
    </div>

    <div class="field">
      <label for="fechaCorte">Fecha de corte</label>
      <input type="date" id="fechaCorte">
    </div>

    <div class="field">
      <label for="fechaHoy">Fecha actual</label>
      <input type="date" id="fechaHoy">
    </div>

    <button onclick="calcularReembolso()">Calcular reembolso 💖</button>

    <div id="mensaje"></div>

    <div class="note">Puedes abrir este archivo directamente en tu navegador.</div>
  </div>

  <script>
    const hoy = new Date();
    const formato = (fecha) => {
      const y = fecha.getFullYear();
      const m = String(fecha.getMonth() + 1).padStart(2, "0");
      const d = String(fecha.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    };

    document.getElementById("fechaHoy").value = formato(hoy);

    const hace15 = new Date(hoy);
    hace15.setDate(hoy.getDate() - 15);
    document.getElementById("fechaCompra").value = formato(hace15);

    const en15 = new Date(hoy);
    en15.setDate(hoy.getDate() + 15);
    document.getElementById("fechaCorte").value = formato(en15);

    function diasEntre(inicio, fin) {
      const a = new Date(inicio + "T00:00:00");
      const b = new Date(fin + "T00:00:00");
      return Math.ceil((b - a) / (1000 * 60 * 60 * 24));
    }

    function calcularReembolso() {
      const precio = parseFloat(document.getElementById("precio").value);
      const fechaCompra = document.getElementById("fechaCompra").value;
      const fechaCorte = document.getElementById("fechaCorte").value;
      const fechaHoy = document.getElementById("fechaHoy").value;
      const mensaje = document.getElementById("mensaje");

      mensaje.innerHTML = "";

      if (!precio || precio <= 0) {
        mensaje.innerHTML = '<div class="error">Ingresa un precio válido.</div>';
        return;
      }

      if (!fechaCompra || !fechaCorte || !fechaHoy) {
        mensaje.innerHTML = '<div class="error">Completa todas las fechas.</div>';
        return;
      }

      const diasTotales = diasEntre(fechaCompra, fechaCorte);
      const diasUsados = diasEntre(fechaCompra, fechaHoy);

      if (diasTotales <= 0) {
        mensaje.innerHTML = '<div class="error">La fecha de corte debe ser posterior a la fecha de compra.</div>';
        return;
      }

      if (diasUsados < 0) {
        mensaje.innerHTML = '<div class="error">La fecha actual no puede ser anterior a la fecha de compra.</div>';
        return;
      }

      const diasRestantes = Math.max(diasTotales - diasUsados, 0);
      const reembolso = (precio / diasTotales) * diasRestantes;

      mensaje.innerHTML = `
        <div class="result">
          <div class="muted">Días totales: ${diasTotales}</div>
          <div class="muted">Días usados: ${diasUsados}</div>
          <div class="muted">Días restantes: ${diasRestantes}</div>
          <div class="refund">Reembolso: $${reembolso.toFixed(2)}</div>
          <div class="tiny">🎀 Bonito, claro y exacto 🎀</div>
        </div>
      `;
    }
  </script>
</body>
</html>
