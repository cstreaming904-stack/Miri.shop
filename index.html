<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Miri Shop - Calculadora</title>

<link rel="manifest" href="manifest-miri.json">
<meta name="theme-color" content="#c88cff">
<link rel="apple-touch-icon" href="icon-512-miri.png">

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:radial-gradient(circle at top,#f7efff 0%,#f3e8ff 22%,#fce7f3 52%,#e0f2fe 78%,#ffffff 100%);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:22px;
color:#4b5563;
position:relative;
overflow-x:hidden;
}

/* (TODO EL CSS SIGUE EXACTAMENTE IGUAL, NO SE MODIFICÓ) */

.bg-sparkles{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
overflow:hidden;
}

.bg-sparkles span{
position:absolute;
color:rgba(255,255,255,0.9);
text-shadow:0 0 10px rgba(255,255,255,0.9),0 0 18px rgba(221,214,254,0.8);
animation:floatSparkle linear infinite;
opacity:.75;
}

@keyframes floatSparkle{
0%,100%{transform:translateY(0) scale(.8);opacity:.25;}
50%{transform:translateY(-10px) scale(1.15);opacity:1;}
}

.card{
width:100%;
max-width:450px;
background:rgba(255,255,255,0.96);
border:4px solid #e9d5ff;
border-radius:34px;
box-shadow:0 18px 45px rgba(170,120,255,0.18);
padding:24px;
position:relative;
overflow:hidden;
z-index:1;
}

.center{
text-align:center;
}

.emoji{
font-size:42px;
margin-bottom:6px;
}

h1{
margin:0;
color:#c026d3;
font-size:30px;
font-weight:900;
}

.phone{
margin-top:6px;
font-size:14px;
font-weight:700;
}

.phone a{
color:#7c3aed;
text-decoration:none;
}

.subtitle{
margin-top:6px;
color:#8b5cf6;
font-weight:700;
font-size:16px;
}

.badge{
display:inline-block;
margin-top:10px;
background:linear-gradient(90deg,#f5d0fe,#e9d5ff,#dbeafe);
color:#9333ea;
font-weight:800;
font-size:12px;
padding:7px 12px;
border-radius:999px;
}

.title2{
margin-top:18px;
color:#374151;
font-size:28px;
font-weight:900;
}

.field{
margin-top:15px;
}

label{
display:block;
color:#c026d3;
font-size:15px;
font-weight:800;
margin-bottom:9px;
}

input{
width:100%;
border:3px solid #e9d5ff;
background:linear-gradient(180deg,#fdf4ff,#f8fafc);
border-radius:20px;
padding:15px 16px;
font-size:18px;
}

.btn{
width:100%;
margin-top:18px;
border:0;
border-radius:22px;
padding:16px;
font-size:20px;
font-weight:900;
color:white;
cursor:pointer;
}

.btn-primary{
background:linear-gradient(90deg,#60a5fa,#a855f7,#ec4899);
}

.btn-whatsapp{
background:linear-gradient(90deg,#8b5cf6,#c026d3,#ec4899);
margin-top:12px;
font-size:18px;
}

.btn-copy{
background:linear-gradient(90deg,#93c5fd,#c4b5fd,#f9a8d4);
margin-top:12px;
font-size:18px;
}

.result{
margin-top:22px;
padding:18px;
border-radius:24px;
background:linear-gradient(180deg,#fdf4ff,#faf5ff,#eff6ff);
border:3px solid #e9d5ff;
text-align:center;
}

.result-main{
font-size:21px;
font-weight:800;
}

.result-main span{
color:#c026d3;
font-size:27px;
font-weight:900;
}

.details{
margin-top:12px;
text-align:left;
font-size:14px;
white-space:pre-line;
background:rgba(255,255,255,0.86);
border-radius:16px;
padding:13px;
}

.mini-msg{
margin-top:12px;
font-size:13px;
text-align:left;
white-space:pre-line;
background:rgba(255,255,255,0.82);
border-radius:16px;
padding:12px;
}

</style>
</head>

<body>

<div class="card">

<div class="center">

<div class="emoji">👑</div>

<h1>MIRI SHOP</h1>

<div class="phone">
<a href="https://wa.me/529811968561">📱 +52 981 196 8561</a>
</div>

<div class="subtitle">Calculadora de reembolsos</div>

<div class="badge">🫧 Bonita, rápida y fácil 🫧</div>

</div>

<div class="title2 center">Resultado</div>

<div class="field">
<label>Precio del servicio</label>
<input id="precio" type="number" placeholder="Ejemplo: 18">
</div>

<div class="field">
<label>Tiempo contratado (días)</label>
<input id="tiempoContratado" type="number" placeholder="Ejemplo: 30">
</div>

<div class="field">
<label>Días de garantía</label>
<input id="diasGarantia" type="number" placeholder="Ejemplo: 7">
</div>

<div class="field">
<label>Fecha de entrega</label>
<input id="fechaEntrega" type="date">
</div>

<div class="field">
<label>Fecha de caída</label>
<input id="fechaCaida" type="date">
</div>

<button class="btn btn-primary" onclick="calcularReembolso()">Calcular reembolso 💞</button>

<button class="btn btn-whatsapp" onclick="enviarWhatsApp()">Enviar cálculo al cliente 💬</button>

<button class="btn btn-copy" onclick="copiarMensaje()">Copiar resultado 📋</button>

<div class="result">

<div class="result-main">
Reembolso: <span id="resultado">$0.00</span>
</div>

<div class="details" id="detalleResultado">Aquí aparecerá el detalle del cálculo.</div>

<div class="mini-msg" id="mensajeCompartir">Primero calcula el reembolso.</div>

</div>

</div>

<script>

function diferenciaDias(inicio,fin){
const i=new Date(inicio+"T00:00:00");
const f=new Date(fin+"T00:00:00");
return Math.floor((f-i)/(1000*60*60*24));
}

function formatearFecha(fecha){
const f=new Date(fecha+"T00:00:00");
return f.toLocaleDateString("es-MX");
}

function calcularReembolso(){

const precio=parseFloat(document.getElementById("precio").value);
const plan=parseInt(document.getElementById("tiempoContratado").value);
const garantia=parseInt(document.getElementById("diasGarantia").value);
const entrega=document.getElementById("fechaEntrega").value;
const caida=document.getElementById("fechaCaida").value;

if(!precio||!plan||!garantia||!entrega||!caida){
alert("Completa todos los campos 💖");
return;
}

const usados=diferenciaDias(entrega,caida);
const valorDia=precio/plan;

let faltantes=0;
let reembolso=0;

if(usados<garantia){
faltantes=garantia-usados;
reembolso=valorDia*faltantes;
}

document.getElementById("resultado").textContent="$"+reembolso.toFixed(2);

document.getElementById("detalleResultado").textContent=
"Días usados: "+usados+"\n"+
"Días garantía: "+garantia+"\n"+
"Días faltantes garantía: "+faltantes+"\n"+
"Valor por día: $"+valorDia.toFixed(2);

/* AQUI ESTA EL CAMBIO */

document.getElementById("mensajeCompartir").textContent=
"Hola 🌸\n"+
"Este es tu cálculo de reembolso en Miri Shop:\n\n"+
"Precio: $"+precio.toFixed(2)+"\n"+
"Plan: "+plan+" días\n"+
"Garantía: "+garantia+" días\n"+
"Entrega: "+formatearFecha(entrega)+"\n"+
"Caída: "+formatearFecha(caida)+"\n"+
"Reembolso: $"+reembolso.toFixed(2)+"\n\n"+
"Este reembolso puede utilizarse como saldo a favor en tu próxima renovación o compra en Miri Shop 💖\n\n"+
"Gracias por comprar en Miri Shop 💖";

}

function enviarWhatsApp(){
const msg=encodeURIComponent(document.getElementById("mensajeCompartir").textContent);
window.open("https://wa.me/?text="+msg);
}

async function copiarMensaje(){
await navigator.clipboard.writeText(document.getElementById("mensajeCompartir").textContent);
alert("Copiado 💖");
}

</script>

</body>
</html>
