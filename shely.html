<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shely Ventas - Calculadora de Reembolsos</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#6ec3ff,#ff8cc6);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:white;
max-width:420px;
width:100%;
border-radius:30px;
padding:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

.center{
text-align:center;
}

.logo{
width:180px;
margin-bottom:10px;
}

h1{
margin:5px 0;
color:#2f63ff;
}

.phone{
font-weight:bold;
color:#ff4fa3;
margin-bottom:10px;
}

.subtitle{
color:#666;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border-radius:12px;
border:2px solid #ffd1e6;
margin-bottom:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:15px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
background:linear-gradient(90deg,#ff6fb2,#7bbcff);
color:white;
}

.result{
margin-top:20px;
padding:15px;
background:#f7f7ff;
border-radius:15px;
}

.reembolso{
font-size:24px;
font-weight:bold;
color:#ff4fa3;
}

</style>
</head>

<body>

<div class="card">

<div class="center">

<img src="https://i.imgur.com/3yafF6E.png" class="logo">

<h1>Shely Ventas</h1>

<div class="phone">+52 664 317 9499</div>

<div class="subtitle">Calculadora de reembolsos</div>

</div>

<label>Precio del servicio</label>
<input id="precio" type="number">

<label>Tiempo contratado (días)</label>
<input id="plan" type="number">

<label>Días de garantía</label>
<input id="garantia" type="number">

<label>Días usados</label>
<input id="usados" type="number">

<button onclick="calcular()">Calcular reembolso</button>

<div class="result" id="resultado" style="display:none">

<div class="reembolso" id="reembolso"></div>

<div id="detalle"></div>

</div>

</div>

<script>

function calcular(){

let precio = parseFloat(document.getElementById("precio").value);
let plan = parseFloat(document.getElementById("plan").value);
let garantia = parseFloat(document.getElementById("garantia").value);
let usados = parseFloat(document.getElementById("usados").value);

let valorDia = precio / plan;

let faltantes = garantia - usados;

if(faltantes < 0){
faltantes = 0;
}

let reembolso = valorDia * faltantes;

document.getElementById("resultado").style.display="block";

document.getElementById("reembolso").innerHTML = "Reembolso: $" + reembolso.toFixed(2);

document.getElementById("detalle").innerHTML = 
"Valor por día: $" + valorDia.toFixed(2) + "<br>" +
"Días restantes de garantía: " + faltantes;

}

</script>

</body>
                                                 </html>
