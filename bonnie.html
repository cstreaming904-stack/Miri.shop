<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bonnie Shop</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
margin:0;
background:linear-gradient(180deg,#ffc5e6,#ff4fb3,#111);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow-x:hidden;
position:relative;
}

body::before{
content:"";
position:fixed;
inset:0;
background-image:
radial-gradient(circle,rgba(255,255,255,.9)0 2px,transparent 3px),
radial-gradient(circle,rgba(255,182,220,.8)0 2px,transparent 3px);
background-size:140px 140px,180px 180px;
opacity:.45;
animation:brillos 10s linear infinite;
pointer-events:none;
}

@keyframes brillos{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

.card{
max-width:430px;
width:100%;
background:linear-gradient(180deg,#ffffff,#fff3fa);
border-radius:30px;
padding:25px;
border:4px solid #ff9bd8;
box-shadow:
0 0 18px rgba(255,20,147,.35),
0 0 35px rgba(255,255,255,.15);
}

.center{
text-align:center;
}

.corona{
font-size:50px;
margin-bottom:10px;
filter:drop-shadow(0 0 6px silver);
}

.titulo{
font-size:30px;
font-weight:bold;
color:#ff1493;
}

.numero{
margin-top:5px;
font-weight:bold;
}

.numero a{
text-decoration:none;
color:#ff1493;
}

.subtitulo{
color:#b83280;
font-weight:bold;
margin-top:4px;
}

.badge{
display:inline-block;
background:#ffd6ec;
padding:8px 15px;
border-radius:20px;
margin-top:10px;
font-weight:bold;
color:#db2777;
}

h2{
text-align:center;
margin-top:20px;
}

label{
font-weight:bold;
color:#ff1493;
display:block;
margin-top:12px;
}

input{
width:100%;
padding:14px;
border-radius:18px;
border:3px solid #ffc2e5;
background:#fff0f8;
margin-top:5px;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:0;
border-radius:25px;
margin-top:15px;
font-size:17px;
font-weight:bold;
cursor:pointer;
color:white;
}

.btn1{
background:linear-gradient(90deg,#ff6a8a,#ff1493);
}

.btn2{
background:linear-gradient(90deg,#8a6aff,#ff1493);
}

.btn3{
background:linear-gradient(90deg,#ffb6d9,#ff69b4);
}

.resultado{
margin-top:20px;
padding:18px;
border-radius:20px;
background:#fff0f8;
border:3px solid #ffc2e5;
}

.resultado h3{
text-align:center;
font-size:26px;
}

.resultado span{
color:#ff1493;
font-weight:bold;
}

.detalle{
background:white;
border-radius:15px;
padding:12px;
margin-top:10px;
white-space:pre-line;
}

.mensaje{
background:white;
border-radius:15px;
padding:12px;
margin-top:10px;
white-space:pre-line;
}

#confetti{
position:fixed;
inset:0;
pointer-events:none;
}

.confetti{
position:absolute;
width:8px;
height:12px;
animation:caer 3s linear forwards;
}

@keyframes caer{
0%{transform:translateY(-10px)}
100%{transform:translateY(100vh) rotate(720deg)}
}

</style>
</head>

<body>

<div id="confetti"></div>

<div class="card">

<div class="center">

<div class="corona">👑</div>

<div class="titulo">BONNIE SHOP</div>

<div class="numero">
📱 <a href="https://wa.me/527441658520">+52 744 165 8520</a>
</div>

<div class="subtitulo">
Calculadora de reembolsos
</div>

<div class="badge">
🐰 Bonita, rápida y fácil 🐰
</div>

</div>

<h2>Resultado</h2>

<label>Precio del servicio</label>
<input id="precio" type="number" placeholder="Ejemplo: 18">

<label>Tiempo contratado (días)</label>
<input id="plan" type="number" placeholder="Ejemplo: 30">

<label>Días de garantía</label>
<input id="garantia" type="number" placeholder="Ejemplo: 7">

<label>📅 Fecha de entrega</label>
<input id="entrega" type="date">

<label>📅 Fecha de caída</label>
<input id="caida" type="date">

<button class="btn1" onclick="calcular()">Calcular reembolso 💞</button>

<button class="btn2" onclick="enviar()">Enviar cálculo al cliente 💬</button>

<button class="btn3" onclick="copiar()">Copiar resultado 📋</button>

<div class="resultado">

<h3>Reembolso: <span id="reembolso">$0.00</span></h3>

<div id="estado"></div>

<div id="detalle" class="detalle"></div>

<div id="mensaje" class="mensaje"></div>

</div>

</div>

<script>

function dias(a,b){
let inicio=new Date(a);
let fin=new Date(b);
return Math.floor((fin-inicio)/(1000*60*60*24));
}

function confeti(){

let cont=document.getElementById("confetti");

for(let i=0;i<60;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=["#ff1493","#ff69b4","#ffc0cb","#ffffff"][Math.floor(Math.random()*4)];

c.style.animationDuration=(2+Math.random()*2)+"s";

cont.appendChild(c);

setTimeout(()=>c.remove(),4000);

}

}

function calcular(){

let precio=parseFloat(precio.value);
let plan=parseInt(plan.value);
let garantia=parseInt(garantia.value);
let entrega=entrega.value;
let caida=caida.value;

let usados=dias(entrega,caida);

let valorDia=precio/plan;

let faltantes=0;
let reembolso=0;

if(usados<garantia){

faltantes=garantia-usados;
reembolso=valorDia*faltantes;

estado.innerHTML="💗 Cayó dentro de garantía";

confeti();

}else{

estado.innerHTML="❌ Fuera de garantía";

}

document.getElementById("reembolso").innerHTML="$"+reembolso.toFixed(2);

detalle.innerHTML=

"Días usados: "+usados+"<br>"+
"Días garantía: "+garantia+"<br>"+
"Días faltantes garantía: "+faltantes+"<br>"+
"Valor por día: $"+valorDia.toFixed(2);

mensaje.innerHTML=

"Hola 🌸<br>"+
"Este es tu cálculo de reembolso en Bonnie Shop:<br><br>"+

"Precio: $"+precio.toFixed(2)+"<br>"+
"Plan: "+plan+" días<br>"+
"Garantía: "+garantia+" días<br>"+
"Entrega: "+entrega+"<br>"+
"Caída: "+caida+"<br>"+
"Reembolso: $"+reembolso.toFixed(2)+"<br><br>"+

"Gracias por comprar en Bonnie Shop 💖";

}

function enviar(){

window.open("https://wa.me/?text="+encodeURIComponent(mensaje.innerText));

}

function copiar(){

navigator.clipboard.writeText(mensaje.innerText);

alert("Resultado copiado");

}

</script>

</body>
</html>
