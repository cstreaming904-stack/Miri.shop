<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bonnie Shop - Calculadora de reembolsos</title>

  <style>
    *{
      box-sizing:border-box;
      font-family:Arial,Helvetica,sans-serif;
    }

    body{
      margin:0;
      background:linear-gradient(180deg,#ffc5e6 0%, #ff4fb3 45%, #111111 100%);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:24px;
      overflow-x:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.95) 0 2px, transparent 3px),
        radial-gradient(circle, rgba(255,192,220,.7) 0 2px, transparent 3px),
        radial-gradient(circle, rgba(255,255,255,.75) 0 1.5px, transparent 2.5px);
      background-size:140px 140px, 190px 190px, 240px 240px;
      background-position:0 0, 40px 50px, 90px 20px;
      opacity:.45;
      animation:glitterFloat 12s linear infinite;
    }

    @keyframes glitterFloat{
      0%{transform:translateY(0);}
      50%{transform:translateY(-18px);}
      100%{transform:translateY(0);}
    }

    .card{
      width:100%;
      max-width:430px;
      background:linear-gradient(180deg,#ffffff 0%, #fff3fa 100%);
      border:4px solid #ff9bd8;
      border-radius:34px;
      padding:24px;
      box-shadow:
        0 0 18px rgba(255,20,147,.32),
        0 0 35px rgba(255,255,255,.16),
        0 20px 45px rgba(0,0,0,.20);
      position:relative;
      z-index:1;
    }

    .center{
      text-align:center;
    }

    .logo{
      width:100%;
      max-width:300px;
      display:block;
      margin:0 auto 8px auto;
      filter:drop-shadow(0 8px 18px rgba(255,20,147,.18));
      mix-blend-mode:multiply;
    }

    .nombre{
      margin:6px 0 0 0;
      color:#ff1493;
      font-size:28px;
      font-weight:900;
    }

    .phone{
      margin-top:6px;
      font-size:14px;
      font-weight:800;
    }

    .phone a{
      color:#ff1493;
      text-decoration:none;
    }

    .subtitle{
      margin-top:6px;
      color:#b83280;
      font-size:16px;
      font-weight:800;
    }

    .badge{
      display:inline-block;
      margin-top:12px;
      background:#ffdced;
      color:#db2777;
      font-weight:800;
      font-size:12px;
      padding:8px 16px;
      border-radius:999px;
    }

    .title2{
      margin:18px 0 8px 0;
      text-align:center;
      color:#374151;
      font-size:28px;
      font-weight:900;
    }

    .field{
      margin-top:14px;
    }

    label{
      display:block;
      color:#ff1493;
      font-size:15px;
      font-weight:800;
      margin-bottom:8px;
    }

    input{
      width:100%;
      border:3px solid #ffc2e5;
      background:#fff0f8;
      border-radius:20px;
      padding:15px 16px;
      font-size:17px;
      color:#374151;
      outline:none;
    }

    input:focus{
      border-color:#ff1493;
      box-shadow:0 0 0 4px rgba(255,20,147,.10);
    }

    .btn{
      width:100%;
      margin-top:16px;
      border:0;
      border-radius:24px;
      padding:16px;
      font-size:18px;
      font-weight:900;
      color:white;
      cursor:pointer;
      position:relative;
      overflow:hidden;
    }

    .btn::before{
      content:"";
      position:absolute;
      top:0;
      left:-120%;
      width:55%;
      height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);
      transform:skewX(-25deg);
      animation:shine 3s infinite;
    }

    @keyframes shine{
      0%{left:-120%;}
      45%{left:160%;}
      100%{left:160%;}
    }

    .btn1{
      background:linear-gradient(90deg,#ff6b8a,#ff1493,#ff4fd2);
      box-shadow:0 0 14px rgba(255,105,180,.45);
    }

    .btn2{
      background:linear-gradient(90deg,#8e6cff,#ff1493);
      box-shadow:0 0 14px rgba(168,85,247,.35);
    }

    .btn3{
      background:linear-gradient(90deg,#ffbfdc,#ff69b4);
      box-shadow:0 0 14px rgba(255,182,217,.35);
    }

    .install-note{
      margin-top:12px;
      text-align:center;
      color:#8b8b8b;
      font-size:12px;
      line-height:1.4;
    }

    .result{
      margin-top:18px;
      padding:18px;
      border-radius:24px;
      background:#fff0f8;
      border:3px solid #ffc2e5;
      text-align:center;
    }

    .result-main{
      font-size:26px;
      font-weight:900;
      color:#111111;
    }

    .result-main span{
      color:#ff1493;
      font-size:30px;
    }

    .status{
      margin-top:10px;
      color:#d946ef;
      font-size:15px;
      font-weight:800;
    }

    .details{
      margin-top:12px;
      background:white;
      border-radius:16px;
      padding:14px;
      text-align:left;
      white-space:pre-line;
      color:#4b5563;
      line-height:1.65;
    }

    .mini-msg{
      margin-top:12px;
      background:white;
      border-radius:16px;
      padding:14px;
      text-align:left;
      white-space:pre-line;
      color:#4b5563;
      line-height:1.45;
    }

    #confetti{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:9998;
    }

    .confetti-piece{
      position:absolute;
      top:-20px;
      width:10px;
      height:16px;
      opacity:.95;
      animation:fall linear forwards;
    }

    @keyframes fall{
      0%{
        transform:translateY(-20px) rotate(0deg);
        opacity:1;
      }
      100%{
        transform:translateY(110vh) rotate(720deg);
        opacity:.9;
      }
    }

    #toast{
      position:fixed;
      left:50%;
      bottom:26px;
      transform:translateX(-50%);
      background:#ff1493;
      color:#fff;
      padding:12px 18px;
      border-radius:999px;
      font-weight:800;
      opacity:0;
      transition:.25s;
      z-index:99999;
    }

    #toast.show{
      opacity:1;
    }
  </style>
</head>
<body>

  <div id="confetti"></div>

  <div class="card">
    <div class="center">
      <img src="logo-bonnie.png" class="logo" alt="Bonnie Shop">
      <div class="nombre">BONNIE SHOP</div>

      <div class="phone">
        📱 <a href="https://wa.me/527441658520">+52 744 165 8520</a>
      </div>

      <div class="subtitle">Calculadora de reembolsos</div>

      <div class="badge">🐰 Bonita, rápida y fácil 🐰</div>
    </div>

    <div class="title2">Resultado</div>

    <div class="field">
      <label>Precio del servicio</label>
      <input id="precio" type="number" placeholder="Ejemplo: 18">
    </div>

    <div class="field">
      <label>Tiempo contratado (días)</label>
      <input id="plan" type="number" placeholder="Ejemplo: 30">
    </div>

    <div class="field">
      <label>Días de garantía</label>
      <input id="garantia" type="number" placeholder="Ejemplo: 7">
    </div>

    <div class="field">
      <label>📅 Fecha de entrega</label>
      <input id="entrega" type="date">
    </div>

    <div class="field">
      <label>📅 Fecha de caída</label>
      <input id="caida" type="date">
    </div>

    <button class="btn btn1" onclick="calcular()">Calcular reembolso 💞</button>
    <button class="btn btn2" onclick="enviar()">Enviar cálculo al cliente 💬</button>
    <button class="btn btn3" onclick="copiar()">Copiar resultado 📋</button>

    <div class="install-note">
      Si no aparece el botón, abre el menú del navegador y toca “Agregar a pantalla de inicio”.
    </div>

    <div class="result">
      <div class="result-main">
        Reembolso: <span id="reembolso">$0.00</span>
      </div>

      <div class="status" id="estadoGarantia"></div>

      <div class="details" id="detalleResultado">Aquí aparecerá el detalle del cálculo.</div>

      <div class="mini-msg" id="mensajeCompartir">Primero calcula el reembolso.</div>
    </div>
  </div>

  <div id="toast">Copiado 💖</div>

  <script>
    function diferenciaDias(inicio,fin){
      const i = new Date(inicio + "T00:00:00");
      const f = new Date(fin + "T00:00:00");
      return Math.floor((f - i) / (1000*60*60*24));
    }

    function formatearFecha(fecha){
      const f = new Date(fecha + "T00:00:00");
      return f.toLocaleDateString("es-MX");
    }

    function mostrarToast(texto){
      const toast = document.getElementById("toast");
      toast.textContent = texto;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function lanzarConfeti(){
      const contenedor = document.getElementById("confetti");
      contenedor.innerHTML = "";
      const colores = ["#ff1493","#ff69b4","#ffc0cb","#ffe4f1","#ffffff"];

      for(let i = 0; i < 90; i++){
        const pieza = document.createElement("span");
        pieza.className = "confetti-piece";
        pieza.style.left = Math.random() * 100 + "vw";
        pieza.style.background = colores[Math.floor(Math.random() * colores.length)];
        pieza.style.width = (6 + Math.random() * 8) + "px";
        pieza.style.height = (10 + Math.random() * 14) + "px";
        pieza.style.borderRadius = Math.random() > 0.5 ? "999px" : "2px";
        pieza.style.animationDuration = (2.8 + Math.random() * 2.2) + "s";
        pieza.style.animationDelay = (Math.random() * 0.6) + "s";
        contenedor.appendChild(pieza);
      }

      setTimeout(() => {
        contenedor.innerHTML = "";
      }, 5500);
    }

    function calcular(){
      const precio = parseFloat(document.getElementById("precio").value);
      const plan = parseInt(document.getElementById("plan").value);
      const garantia = parseInt(document.getElementById("garantia").value);
      const entrega = document.getElementById("entrega").value;
      const caida = document.getElementById("caida").value;

      if(!precio || !plan || !garantia || !entrega || !caida){
        alert("Completa todos los campos 💖");
        return;
      }

      const usados = diferenciaDias(entrega,caida);
      const valorDia = precio / plan;

      let faltantes = 0;
      let reembolso = 0;

      if(usados < garantia){
        faltantes = garantia - usados;
        reembolso = valorDia * faltantes;
        document.getElementById("estadoGarantia").textContent = "💗 Cayó dentro de garantía";
        lanzarConfeti();
      }else{
        document.getElementById("estadoGarantia").textContent = "❌ Fuera de garantía";
      }

      document.getElementById("reembolso").textContent = "$" + reembolso.toFixed(2);

      document.getElementById("detalleResultado").textContent =
        "Días usados: " + usados + "\n" +
        "Días garantía: " + garantia + "\n" +
        "Días faltantes garantía: " + faltantes + "\n" +
        "Valor por día: $" + valorDia.toFixed(2);

      document.getElementById("mensajeCompartir").textContent =
        "Hola 🌸\n" +
        "Este es tu cálculo de reembolso en Bonnie Shop:\n\n" +
        "Precio: $" + precio.toFixed(2) + "\n" +
        "Plan: " + plan + " días\n" +
        "Garantía: " + garantia + " días\n" +
        "Entrega: " + formatearFecha(entrega) + "\n" +
        "Caída: " + formatearFecha(caida) + "\n" +
        "Reembolso: $" + reembolso.toFixed(2) + "\n\n" +
        "Gracias por comprar en Bonnie Shop 💖";
    }

    function enviar(){
      const texto = document.getElementById("mensajeCompartir").textContent;

      if(!texto || texto === "Primero calcula el reembolso."){
        mostrarToast("Primero calcula el reembolso 💖");
        return;
      }

      window.open("https://wa.me/?text=" + encodeURIComponent(texto), "_blank");
    }

    function copiar(){
      const texto = document.getElementById("mensajeCompartir").textContent;

      if(!texto || texto === "Primero calcula el reembolso."){
        mostrarToast("Primero calcula el reembolso 💖");
        return;
      }

      navigator.clipboard.writeText(texto);
      mostrarToast("Resultado copiado 💖");
    }
  </script>
</body>
</html>
