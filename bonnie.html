<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bonnie Shop - Calculadora</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
margin:0;
background:linear-gradient(180deg,#ffc1e3,#ff4fb3,#111111);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background-image:
radial-gradient(circle, rgba(255,255,255,.9) 0 2px, transparent 3px),
radial-gradient(circle, rgba(255,182,220,.8) 0 2px, transparent 3px);
background-size:140px 140px,180px 180px;
animation:brillos 10s linear infinite;
opacity:.5;
}

@keyframes brillos{
0%{transform:translateY(0);}
50%{transform:translateY(-20px);}
100%{transform:translateY(0);}
}

.card{

max-width:430px;
width:100%;
background:linear-gradient(180deg,#ffffff,#ffeaf5);
border-radius:30px;
padding:25px;
border:4px solid #ff8fd1;
box-shadow:0 0 18px rgba(255,20,147,0.35);

}

.logo{

width:100%;
max-width:320px;
display:block;
margin:auto;
margin-bottom:10px;
mix-blend-mode:multiply;

}

.numero{

text-align:center;
font-weight:bold;
font-size:16px;
margin-bottom:15px;

}

.numero a{

text-decoration:none;
color:#ff1493;
font-weight:bold;

}

.badge{

text-align:center;
margin-bottom:15px;
background:#ffd6ec;
padding:8px;
border-radius:20px;
font-weight:bold;
color:#db2777;

}

label{

font-weight:bold;
color:#ff1493;
display:block;
margin-top:10px;

}

input{

width:100%;
padding:14px;
border-radius:18px;
border:3px solid #ffc2e5;
background:#fff0f8;
margin-top:5px;
font-size:16px;

}

button{

width:100%;
padding:15px;
border:0;
border-radius:25px;
margin-top:15px;
font-size:17px;
font-weight:bold;
cursor:pointer;
color:white;
position:relative;
overflow:hidden;

}

button::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:50%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);
animation:shine 3s infinite;
}

@keyframes shine{
0%{left:-100%;}
50%{left:150%;}
100%{left:150%;}
}

.btn1{
background:linear-gradient(90deg,#ff4fb3,#000000,#ff4fb3);
}

.btn2{
background:linear-gradient(90deg,#ff7bc3,#111111,#ff1493);
}

.btn3{
background:linear-gradient(90deg,#ffc0df,#9f2f6f,#ff69b4);
}

.resultado{

margin-top:20px;
padding:18px;
border-radius:20px;
background:#fff0f8;
border:3px solid #ffc2e5;
text-align:center;

}

.resultado span{

color:#ff1493;
font-size:28px;
font-weight:bold;

}

.detalle{

margin-top:10px;
white-space:pre-line;
text-align:left;

}

#confetti{
position:fixed;
inset:0;
pointer-events:none;
}

.confetti{
position:absolute;
width:8px;
height:12px;
background:pink;
animation:caer 3s linear forwards;
}

@keyframes caer{
0%{transform:translateY(-10px) rotate(0deg);}
100%{transform:translateY(100vh) rotate(720deg);}
}

</style>
</head>

<body>

<div id="confetti"></div>

<div class="card">

<img src="logo-bonnie.png" class="logo">

<div class="numero">
📱 <a href="https://wa.me/527441658520">+52 744 165 8520</a>
</div>

<div class="badge">
🐰 Bonita, rápida y fácil 🐰
</div>

<label>Precio del servicio</label>
<input id="precio" type="number" placeholder="Ejemplo: 15">

<label>Tiempo contratado (días)</label>
<input id="plan" type="number" placeholder="Ejemplo: 30">

<label>Días de garantía</label>
<input id="garantia" type="number" placeholder="Ejemplo: 23">

<label>Fecha de entrega</label>
<input id="entrega" type="date">

<label>Fecha de caída</label>
<input id="caida" type="date">

<button class="btn1" onclick="calcular()">Calcular reembolso 💞</button>

<button class="btn2" onclick="enviar()">Enviar cálculo al cliente 💬</button>

<button class="btn3" onclick="copiar()">Copiar resultado 📋</button>

<div class="resultado">

Reembolso: <span id="reembolso">$0.00</span>

<div id="detalle" class="detalle">
Aquí aparecerá el cálculo.
</div>

</div>

</div>

<script>

function dias(a,b){

let inicio=new Date(a);
let fin=new Date(b);

return Math.floor((fin-inicio)/(1000*60*60*24));

}

function confeti(){

let cont=document.getElementById("confetti");

for(let i=0;i<60;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=["#ff1493","#ff69b4","#ffc0cb","#ffffff"][Math.floor(Math.random()*4)];

c.style.animationDuration=(2+Math.random()*2)+"s";

cont.appendChild(c);

setTimeout(()=>c.remove(),4000);

}

}

function calcular(){

let precio=parseFloat(document.getElementById("precio").value);
let plan=parseInt(document.getElementById("plan").value);
let garantia=parseInt(document.getElementById("garantia").value);
let entrega=document.getElementById("entrega").value;
let caida=document.getElementById("caida").value;

if(!precio||!plan||!garantia||!entrega||!caida){

alert("Completa todos los campos");
return;

}

let usados=dias(entrega,caida);

let valorDia=precio/plan;

let faltantes=0;
let reembolso=0;

if(usados<garantia){

faltantes=garantia-usados;
reembolso=valorDia*faltantes;
confeti();

}

document.getElementById("reembolso").textContent="$"+reembolso.toFixed(2);

document.getElementById("detalle").textContent=

"Días usados: "+usados+"\n"+
"Días garantía: "+garantia+"\n"+
"Días faltantes garantía: "+faltantes+"\n"+
"Valor por día: $"+valorDia.toFixed(2);

}

function enviar(){

let texto=
document.getElementById("detalle").textContent+
"\n\nReembolso: "+document.getElementById("reembolso").textContent;

window.open("https://wa.me/?text="+encodeURIComponent(texto));

}

function copiar(){

let texto=
document.getElementById("detalle").textContent+
"\nReembolso: "+document.getElementById("reembolso").textContent;

navigator.clipboard.writeText(texto);

alert("Resultado copiado");

}

</script>

</body>
</html>
