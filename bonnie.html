<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bonnie Shop - Calculadora de reembolsos</title>

  <style>
    *{
      box-sizing:border-box;
      font-family:Arial,Helvetica,sans-serif;
    }

    body{
      margin:0;
      background:linear-gradient(180deg,#ffc5e6 0%, #ff4fb3 45%, #111111 100%);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      overflow-x:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.95) 0 2px, transparent 3px),
        radial-gradient(circle, rgba(255,192,220,.75) 0 2px, transparent 3px),
        radial-gradient(circle, rgba(220,220,220,.75) 0 1.5px, transparent 2.5px);
      background-size:140px 140px, 190px 190px, 240px 240px;
      background-position:0 0, 40px 50px, 90px 20px;
      opacity:.42;
      animation:glitterFloat 12s linear infinite;
    }

    @keyframes glitterFloat{
      0%{transform:translateY(0);}
      50%{transform:translateY(-18px);}
      100%{transform:translateY(0);}
    }

    .card{
      width:100%;
      max-width:430px;
      background:linear-gradient(180deg,#ffffff 0%, #fff3fa 100%);
      border:4px solid #ff9bd8;
      border-radius:34px;
      padding:24px;
      box-shadow:
        0 0 18px rgba(255,20,147,.32),
        0 0 35px rgba(255,255,255,.16),
        0 20px 45px rgba(0,0,0,.20);
      position:relative;
      z-index:1;
      animation:entrada .7s ease;
    }

    @keyframes entrada{
      from{
        opacity:0;
        transform:translateY(20px) scale(.98);
      }
      to{
        opacity:1;
        transform:translateY(0) scale(1);
      }
    }

    .center{
      text-align:center;
    }

    .corona-wrap{
      position:relative;
      display:inline-block;
      margin-bottom:8px;
    }

    .corona{
      font-size:52px;
      display:inline-block;
      filter:
        drop-shadow(0 0 6px rgba(255,255,255,.95))
        drop-shadow(0 0 10px rgba(192,192,192,.95))
        drop-shadow(0 0 18px rgba(255,255,255,.75));
      animation:coronaBrilla 2s ease-in-out infinite;
    }

    @keyframes coronaBrilla{
      0%,100%{
        transform:scale(1) rotate(0deg);
        filter:
          drop-shadow(0 0 6px rgba(255,255,255,.95))
          drop-shadow(0 0 10px rgba(192,192,192,.95))
          drop-shadow(0 0 18px rgba(255,255,255,.75));
      }
      50%{
        transform:scale(1.08) rotate(-2deg);
        filter:
          drop-shadow(0 0 10px rgba(255,255,255,1))
          drop-shadow(0 0 16px rgba(220,220,220,1))
          drop-shadow(0 0 28px rgba(255,255,255,.95));
      }
    }

    .spark{
      position:absolute;
      color:#ffffff;
      font-size:15px;
      animation:destello 1.8s infinite ease-in-out;
      text-shadow:0 0 8px #fff, 0 0 14px silver;
    }

    .spark1{top:-6px; left:-10px; animation-delay:0s;}
    .spark2{top:4px; right:-8px; animation-delay:.6s;}
    .spark3{bottom:0; left:50%; transform:translateX(-50%); animation-delay:1.1s;}

    @keyframes destello{
      0%,100%{opacity:.2; transform:scale(.7);}
      50%{opacity:1; transform:scale(1.2);}
    }

    .titulo{
      font-size:30px;
      font-weight:900;
      color:#ff1493;
      margin:0;
    }

    .numero{
      margin-top:6px;
      font-size:14px;
      font-weight:800;
    }

    .numero a{
      text-decoration:none;
      color:#ff1493;
    }

    .subtitulo{
      color:#b83280;
      font-weight:800;
      margin-top:6px;
      font-size:16px;
    }

    .badge{
      display:inline-block;
      background:#ffd6ec;
      padding:8px 15px;
      border-radius:20px;
      margin-top:10px;
      font-weight:800;
      color:#db2777;
      font-size:12px;
    }

    h2{
      text-align:center;
      margin-top:20px;
      margin-bottom:6px;
      color:#374151;
      font-size:28px;
    }

    .field{
      margin-top:14px;
    }

    label{
      font-weight:800;
      color:#ff1493;
      display:block;
      margin-bottom:8px;
      font-size:15px;
    }

    input{
      width:100%;
      padding:15px;
      border-radius:20px;
      border:3px solid #ffc2e5;
      background:#fff0f8;
      font-size:17px;
      color:#374151;
      outline:none;
    }

    input:focus{
      border-color:#ff1493;
      box-shadow:0 0 0 4px rgba(255,20,147,.10);
    }

    button{
      width:100%;
      padding:16px;
      border:0;
      border-radius:30px;
      margin-top:15px;
      font-size:17px;
      font-weight:900;
      cursor:pointer;
      color:white;
      position:relative;
      overflow:hidden;
      background:linear-gradient(90deg,#ff6aa9,#ff1493,#000000);
      box-shadow:
        0 0 10px rgba(255,20,147,.5),
        0 6px 15px rgba(0,0,0,.35);
    }

    button::after{
      content:"";
      position:absolute;
      top:0;
      left:-120%;
      width:60%;
      height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);
      transform:skewX(-25deg);
      animation:brilloBoton 3s infinite;
    }

    @keyframes brilloBoton{
      0%{left:-120%;}
      45%{left:160%;}
      100%{left:160%;}
    }

    .btn2{
      background:linear-gradient(90deg,#8a6aff,#ff1493,#000000);
    }

    .btn3{
      background:linear-gradient(90deg,#ffb6d9,#ff69b4,#6b214f);
    }

    .btn-install{
      background:linear-gradient(90deg,#c0c0c0,#7a7a7a,#ff69b4);
      display:none;
    }

    .install-note{
      margin-top:10px;
      text-align:center;
      color:#8b8b8b;
      font-size:12px;
      line-height:1.4;
    }

    .result{
      margin-top:20px;
      padding:18px;
      border-radius:20px;
      background:#fff0f8;
      border:3px solid #ffc2e5;
    }

    .result-main{
      text-align:center;
      font-size:26px;
      font-weight:900;
      color:#111111;
    }

    .result-main span{
      color:#ff1493;
      font-weight:900;
    }

    #estadoGarantia{
      text-align:center;
      color:#d946ef;
      font-weight:800;
      margin-top:10px;
      font-size:15px;
    }

    .details{
      background:white;
      border-radius:15px;
      padding:12px;
      margin-top:10px;
      white-space:pre-line;
      color:#4b5563;
      line-height:1.6;
    }

    .mensaje{
      background:white;
      border-radius:15px;
      padding:12px;
      margin-top:10px;
      white-space:pre-line;
      color:#4b5563;
      line-height:1.45;
    }

    #confetti{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:9998;
    }

    .confetti{
      position:absolute;
      width:8px;
      height:12px;
      animation:caer 3s linear forwards;
    }

    @keyframes caer{
      0%{transform:translateY(-10px);}
      100%{transform:translateY(100vh) rotate(720deg);}
    }

    #toast{
      position:fixed;
      left:50%;
      bottom:26px;
      transform:translateX(-50%);
      background:#ff1493;
      color:#fff;
      padding:12px 18px;
      border-radius:999px;
      font-weight:800;
      opacity:0;
      transition:.25s;
      z-index:99999;
    }

    #toast.show{
      opacity:1;
    }
  </style>
</head>
<body>

  <div id="confetti"></div>

  <div class="card">
    <div class="center">
      <div class="corona-wrap">
        <div class="corona">👑</div>
        <div class="spark spark1">✦</div>
        <div class="spark spark2">✦</div>
        <div class="spark spark3">✦</div>
      </div>

      <div class="titulo">BONNIE SHOP</div>

      <div class="numero">
        📱 <a href="https://wa.me/527441658520">+52 744 165 8520</a>
      </div>

      <div class="subtitulo">Calculadora de reembolsos</div>

      <div class="badge">🐰 Bonita, rápida y fácil 🐰</div>
    </div>

    <h2>Resultado</h2>

    <div class="field">
      <label>Precio del servicio</label>
      <input id="precio" type="number" placeholder="Ejemplo: 18">
    </div>

    <div class="field">
      <label>Tiempo contratado (días)</label>
      <input id="plan" type="number" placeholder="Ejemplo: 30">
    </div>

    <div class="field">
      <label>Días de garantía</label>
      <input id="garantia" type="number" placeholder="Ejemplo: 7">
    </div>

    <div class="field">
      <label>📅 Fecha de entrega</label>
      <input id="entrega" type="date">
    </div>

    <div class="field">
      <label>📅 Fecha de caída</label>
      <input id="caida" type="date">
    </div>

    <button onclick="calcular()">Calcular reembolso 💞</button>
    <button class="btn2" onclick="enviar()">Enviar cálculo al cliente 💬</button>
    <button class="btn3" onclick="copiar()">Copiar resultado 📋</button>
    <button id="installBtn" class="btn-install">Instalar app 👑</button>

    <div class="install-note">
      Si no aparece el botón, abre el menú del navegador y toca “Agregar a pantalla de inicio”.
    </div>

    <div class="result">
      <div class="result-main">
        Reembolso: <span id="reembolso">$0.00</span>
      </div>

      <div id="estadoGarantia"></div>

      <div id="detalleResultado" class="details">Aquí aparecerá el detalle del cálculo.</div>

      <div id="mensajeCompartir" class="mensaje">Primero calcula el reembolso.</div>
    </div>
  </div>

  <div id="toast">Copiado 💖</div>

  <script>
    let deferredPrompt = null;
    const installBtn = document.getElementById("installBtn");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = "block";
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) {
        mostrarToast("Usa Agregar a pantalla de inicio 👑");
        return;
      }
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.style.display = "none";
    });

    function dias(a,b){
      let inicio = new Date(a + "T00:00:00");
      let fin = new Date(b + "T00:00:00");
      return Math.floor((fin-inicio)/(1000*60*60*24));
    }

    function formatearFecha(fecha){
      let f = new Date(fecha + "T00:00:00");
      return f.toLocaleDateString("es-MX");
    }

    function mostrarToast(texto){
      let toast = document.getElementById("toast");
      toast.textContent = texto;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function confeti(){
      let cont = document.getElementById("confetti");

      for(let i=0;i<60;i++){
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random()*100 + "vw";
        c.style.background = ["#ff1493","#ff69b4","#ffc0cb","#ffffff"][Math.floor(Math.random()*4)];
        c.style.animationDuration = (2 + Math.random()*2) + "s";
        cont.appendChild(c);
        setTimeout(()=>c.remove(),4000);
      }
    }

    function calcular(){
      let precio = parseFloat(document.getElementById("precio").value);
      let plan = parseInt(document.getElementById("plan").value);
      let garantia = parseInt(document.getElementById("garantia").value);
      let entrega = document.getElementById("entrega").value;
      let caida = document.getElementById("caida").value;

      if(!precio || !plan || !garantia || !entrega || !caida){
        alert("Completa todos los campos 💖");
        return;
      }

      let usados = dias(entrega,caida);
      let valorDia = precio/plan;
      let faltantes = 0;
      let reembolso = 0;

      if(usados < garantia){
        faltantes = garantia-usados;
        reembolso = valorDia*faltantes;
        document.getElementById("estadoGarantia").innerHTML = "💗 Cayó dentro de garantía";
        confeti();
      }else{
        document.getElementById("estadoGarantia").innerHTML = "❌ Fuera de garantía";
      }

      document.getElementById("reembolso").innerHTML = "$" + reembolso.toFixed(2);

      document.getElementById("detalleResultado").innerHTML =
        "Días usados: " + usados + "<br>" +
        "Días garantía: " + garantia + "<br>" +
        "Días faltantes garantía: " + faltantes + "<br>" +
        "Valor por día: $" + valorDia.toFixed(2);

      document.getElementById("mensajeCompartir").innerHTML =
        "Hola 🌸<br>" +
        "Este es tu cálculo de reembolso en Bonnie Shop:<br><br>" +
        "Precio: $" + precio.toFixed(2) + "<br>" +
        "Plan: " + plan + " días<br>" +
        "Garantía: " + garantia + " días<br>" +
        "Entrega: " + formatearFecha(entrega) + "<br>" +
        "Caída: " + formatearFecha(caida) + "<br>" +
        "Reembolso: $" + reembolso.toFixed(2) + "<br><br>" +
        "Gracias por comprar en Bonnie Shop 💖";
    }

    function enviar(){
      window.open("https://wa.me/?text=" + encodeURIComponent(document.getElementById("mensajeCompartir").innerText));
    }

    function copiar(){
      navigator.clipboard.writeText(document.getElementById("mensajeCompartir").innerText);
      mostrarToast("Resultado copiado 💖");
    }
  </script>

</body>
</html>
