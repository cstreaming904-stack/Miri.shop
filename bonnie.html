<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bonnie Shop - Calculadora</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
margin:0;
background:linear-gradient(180deg,#ffc5e6 0%,#ff4fb3 50%,#111111 100%);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:430px;
background:white;
border-radius:30px;
padding:25px;
border:4px solid #ff9bd8;
box-shadow:0 0 20px rgba(255,20,147,.35);
}

.center{
text-align:center;
}

.logo img{
width:100%;
max-width:260px;
display:block;
margin:auto;
animation:flotar 4s ease-in-out infinite;
filter:drop-shadow(0 0 10px #ff69b4);
}

@keyframes flotar{
0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}
}

/* TITULO */

.titulo{
display:flex;
align-items:center;
justify-content:center;
gap:6px;
margin-top:8px;
}

.titulo-texto{

font-size:26px;
font-weight:900;

background:linear-gradient(
180deg,
#ffffff 0%,
#f9a8d4 25%,
#ff1493 45%,
#c026d3 65%,
#000000 90%
);

-webkit-background-clip:text;
background-clip:text;
color:transparent;

text-shadow:
0 2px 6px rgba(255,20,147,.5),
0 0 12px rgba(255,255,255,.6),
0 0 18px rgba(255,20,147,.4);

}

/* MOÑITOS */

.bow{
font-size:22px;
position:relative;
animation:bowFloat 2s infinite ease-in-out;
}

.bow::after{
content:"✦";
position:absolute;
top:-6px;
right:-4px;
font-size:10px;
color:white;
text-shadow:
0 0 6px white,
0 0 10px #ffd6ec;
animation:sparkle 1.6s infinite;
}

@keyframes sparkle{
0%,100%{opacity:.2;transform:scale(.7)}
50%{opacity:1;transform:scale(1.2)}
}

@keyframes bowFloat{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-2px)}
}

.numero{
margin-top:6px;
font-weight:bold;
}

.numero a{
color:#ff1493;
text-decoration:none;
}

.subtitulo{
margin-top:6px;
font-weight:bold;
color:#b83280;
}

.badge{
display:inline-block;
background:#ffd6ec;
padding:8px 15px;
border-radius:20px;
margin-top:10px;
font-weight:bold;
color:#db2777;
}

h2{
text-align:center;
margin-top:20px;
}

.field{
margin-top:14px;
}

label{
font-weight:bold;
color:#ff1493;
display:block;
margin-bottom:6px;
}

input{
width:100%;
padding:15px;
border-radius:20px;
border:3px solid #ffc2e5;
background:#fff0f8;
font-size:16px;
}

/* BOTONES */

button{
width:100%;
padding:16px;
border:none;
border-radius:30px;
margin-top:15px;
font-size:17px;
font-weight:bold;
color:white;
cursor:pointer;
position:relative;
overflow:hidden;
background:linear-gradient(90deg,#ff6aa9,#ff1493,#000);
box-shadow:0 6px 15px rgba(0,0,0,.35);
}

button::after{
content:"";
position:absolute;
top:0;
left:-120%;
width:60%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);
transform:skewX(-25deg);
animation:shine 3s infinite;
}

@keyframes shine{
0%{left:-120%}
50%{left:150%}
100%{left:150%}
}

.btn2{
background:linear-gradient(90deg,#8a6aff,#ff1493,#000);
}

.btn3{
background:linear-gradient(90deg,#ffb6d9,#ff69b4,#6b214f);
}

/* RESULTADO */

.result{
margin-top:20px;
padding:18px;
border-radius:20px;
background:#fff0f8;
border:3px solid #ffc2e5;
}

.result-main{
text-align:center;
font-size:26px;
font-weight:bold;
}

.result-main span{
color:#ff1493;
}

#estado{
text-align:center;
margin-top:10px;
font-weight:bold;
color:#d946ef;
}

.details,
.mensaje{
background:white;
border-radius:15px;
padding:12px;
margin-top:10px;
white-space:pre-line;
}

/* CONFETI */

.confetti{
position:fixed;
width:8px;
height:12px;
animation:caer 3s linear forwards;
pointer-events:none;
}

@keyframes caer{
0%{transform:translateY(-10px)}
100%{transform:translateY(100vh) rotate(720deg)}
}

</style>
</head>

<body>

<div class="card">

<div class="center">

<div class="logo">
<img src="logo-bonnie.png">
</div>

<div class="titulo">
<span class="bow">🎀</span>
<span class="titulo-texto">BONNIE SHOP</span>
<span class="bow">🎀</span>
</div>

<div class="numero">
📱 <a href="https://wa.me/527441658520">+52 744 165 8520</a>
</div>

<div class="subtitulo">
Calculadora de reembolsos
</div>

<div class="badge">
🐰 Bonita, rápida y fácil 🐰
</div>

</div>

<h2>Resultado</h2>

<div class="field">
<label>Precio del servicio</label>
<input id="precio" type="number" placeholder="Ejemplo: 18">
</div>

<div class="field">
<label>Tiempo contratado (días)</label>
<input id="plan" type="number" placeholder="Ejemplo: 30">
</div>

<div class="field">
<label>Días de garantía</label>
<input id="garantia" type="number" placeholder="Ejemplo: 7">
</div>

<div class="field">
<label>📅 Fecha de entrega</label>
<input id="entrega" type="date">
</div>

<div class="field">
<label>📅 Fecha de caída</label>
<input id="caida" type="date">
</div>

<button onclick="calcular()">Calcular reembolso 💞</button>

<button class="btn2" onclick="enviar()">Enviar cálculo al cliente 💬</button>

<button class="btn3" onclick="copiar()">Copiar resultado 📋</button>

<div class="result">

<div class="result-main">
Reembolso: <span id="reembolso">$0.00</span>
</div>

<div id="estado"></div>

<div id="detalle" class="details">
Aquí aparecerá el cálculo
</div>

<div id="mensaje" class="mensaje">
Primero calcula el reembolso
</div>

</div>

</div>

<script>

function dias(a,b){
const inicio=new Date(a+"T00:00:00")
const fin=new Date(b+"T00:00:00")
return Math.floor((fin-inicio)/(1000*60*60*24))
}

function formatearFecha(fecha){
const f=new Date(fecha+"T00:00:00")
return f.toLocaleDateString("es-MX")
}

function calcular(){

const precio=parseFloat(document.getElementById("precio").value)
const plan=parseInt(document.getElementById("plan").value)
const garantia=parseInt(document.getElementById("garantia").value)
const entrega=document.getElementById("entrega").value
const caida=document.getElementById("caida").value

if(!precio||!plan||!garantia||!entrega||!caida){
alert("Completa todos los campos 💖")
return
}

const usados=dias(entrega,caida)
const valorDia=precio/plan

let faltantes=0
let reembolso=0

if(usados<garantia){

faltantes=garantia-usados
reembolso=valorDia*faltantes

document.getElementById("estado").innerHTML="💗 Cayó dentro de garantía"

confeti()

}else{

document.getElementById("estado").innerHTML="❌ Fuera de garantía"

}

document.getElementById("reembolso").innerHTML="$"+reembolso.toFixed(2)

document.getElementById("detalle").innerHTML=

"Días usados: "+usados+"<br>"+
"Días garantía: "+garantia+"<br>"+
"Días faltantes garantía: "+faltantes+"<br>"+
"Valor por día: $"+valorDia.toFixed(2)

document.getElementById("mensaje").innerHTML=

"Hola 🌸<br>"+
"Este es tu cálculo de reembolso en Bonnie Shop:<br><br>"+
"Precio: $"+precio.toFixed(2)+"<br>"+
"Plan: "+plan+" días<br>"+
"Garantía: "+garantia+" días<br>"+
"Entrega: "+formatearFecha(entrega)+"<br>"+
"Caída: "+formatearFecha(caida)+"<br>"+
"Reembolso: $"+reembolso.toFixed(2)+"<br><br>"+
"Gracias por comprar en Bonnie Shop 💖"

}

function enviar(){
window.open("https://wa.me/?text="+encodeURIComponent(document.getElementById("mensaje").innerText))
}

function copiar(){
navigator.clipboard.writeText(document.getElementById("mensaje").innerText)
alert("Resultado copiado 💖")
}

function confeti(){

for(let i=0;i<50;i++){

const c=document.createElement("div")
c.className="confetti"

c.style.left=Math.random()*100+"vw"

c.style.background=[
"#ff1493",
"#ff69b4",
"#ffc0cb",
"#fff"
][Math.floor(Math.random()*4)]

c.style.animationDuration=(2+Math.random()*2)+"s"

document.body.appendChild(c)

setTimeout(()=>c.remove(),3000)

}

}

</script>

</body>
</html>
