<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bonnie Shop - Calculadora de Reembolsos</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:radial-gradient(circle at top,#ffd1ec 0%,#ffb3df 40%,#ffe3f4 100%);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
      color:#444;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.9) 0 2px, transparent 3px),
        radial-gradient(circle, rgba(255,105,180,.35) 0 2px, transparent 3px),
        radial-gradient(circle, rgba(255,182,193,.45) 0 2px, transparent 3px);
      background-size:120px 120px, 180px 180px, 220px 220px;
      background-position:10px 10px, 60px 40px, 120px 80px;
      animation:floatSparkles 14s linear infinite;
      opacity:.5;
    }

    @keyframes floatSparkles{
      0%{transform:translateY(0);}
      50%{transform:translateY(-12px);}
      100%{transform:translateY(0);}
    }

    .card{
      width:100%;
      max-width:450px;
      background:rgba(255,255,255,0.97);
      border:4px solid #ff8fd1;
      border-radius:35px;
      box-shadow:0 20px 45px rgba(255,0,140,0.15);
      padding:25px;
      position:relative;
      z-index:1;
    }

    .center{
      text-align:center;
    }

    .logo{
      width:120px;
      height:120px;
      object-fit:cover;
      border-radius:28px;
      margin-bottom:10px;
      box-shadow:0 12px 28px rgba(255,20,147,0.18);
    }

    h1{
      margin:0;
      color:#ff1493;
      font-size:30px;
      font-weight:900;
    }

    .phone{
      margin-top:6px;
      font-weight:700;
      font-size:14px;
    }

    .phone a{
      color:#111827;
      text-decoration:none;
    }

    .subtitle{
      margin-top:6px;
      font-weight:700;
      color:#c026d3;
    }

    .badge{
      display:inline-block;
      margin-top:10px;
      background:#ffe4f1;
      color:#db2777;
      font-weight:800;
      font-size:12px;
      padding:7px 12px;
      border-radius:999px;
    }

    .title2{
      margin-top:18px;
      color:#374151;
      font-size:28px;
      font-weight:900;
      text-align:center;
    }

    .field{
      margin-top:15px;
    }

    label{
      display:block;
      font-weight:800;
      color:#ff1493;
      margin-bottom:8px;
    }

    input{
      width:100%;
      border:3px solid #ffc2e5;
      background:#fff0f8;
      border-radius:20px;
      padding:15px;
      font-size:18px;
      color:#374151;
      outline:none;
    }

    input:focus{
      border-color:#ff1493;
      box-shadow:0 0 0 4px rgba(255,20,147,.10);
    }

    .btn{
      width:100%;
      margin-top:15px;
      border:0;
      border-radius:25px;
      padding:16px;
      font-size:18px;
      font-weight:900;
      color:white;
      cursor:pointer;
    }

    .btn-primary{
      background:linear-gradient(90deg,#ff6fb5,#ff1493,#111827);
    }

    .btn-whatsapp{
      background:linear-gradient(90deg,#ff7bc3,#ff1493);
    }

    .btn-copy{
      background:linear-gradient(90deg,#ffb6d9,#ff69b4);
    }

    .result{
      margin-top:20px;
      padding:18px;
      border-radius:25px;
      background:#fff0f8;
      border:3px solid #ffc2e5;
      text-align:center;
    }

    .result-main{
      font-size:22px;
      font-weight:900;
      color:#374151;
    }

    .result-main span{
      color:#ff1493;
      font-size:30px;
    }

    .status{
      margin-top:10px;
      font-weight:800;
      color:#db2777;
    }

    .details{
      margin-top:10px;
      text-align:left;
      white-space:pre-line;
      font-size:14px;
      background:rgba(255,255,255,0.85);
      border-radius:16px;
      padding:12px;
    }

    .mini-msg{
      margin-top:12px;
      font-size:13px;
      text-align:left;
      white-space:pre-line;
      background:rgba(255,255,255,0.8);
      border-radius:16px;
      padding:12px;
    }

    #toast{
      position:fixed;
      left:50%;
      bottom:28px;
      transform:translateX(-50%);
      background:#ff1493;
      color:white;
      padding:12px 18px;
      border-radius:999px;
      font-weight:800;
      opacity:0;
      transition:.25s;
      z-index:99999;
    }

    #toast.show{
      opacity:1;
    }

    #confetti{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:9998;
    }

    .confetti-piece{
      position:absolute;
      top:-20px;
      width:10px;
      height:16px;
      opacity:.95;
      animation:fall linear forwards;
    }

    @keyframes fall{
      0%{
        transform:translateY(-20px) rotate(0deg);
        opacity:1;
      }
      100%{
        transform:translateY(110vh) rotate(720deg);
        opacity:.9;
      }
    }
  </style>
</head>
<body>

  <div id="confetti"></div>

  <div class="card">
    <div class="center">
      <img src="bonnie.jpg" class="logo" alt="Bonnie Shop">
      <h1>BONNIE SHOP</h1>

      <div class="phone">
        <a href="https://wa.me/527441658520">📱 +52 744 165 8520</a>
      </div>

      <div class="subtitle">Calculadora de reembolsos</div>
      <div class="badge">🎀 Bonita, rápida y fácil 🎀</div>
    </div>

    <div class="title2">Resultado</div>

    <div class="field">
      <label>Precio del servicio</label>
      <input id="precio" type="number" placeholder="Ejemplo: 15">
    </div>

    <div class="field">
      <label>Tiempo contratado (días)</label>
      <input id="tiempoContratado" type="number" placeholder="Ejemplo: 30">
    </div>

    <div class="field">
      <label>Días de garantía</label>
      <input id="diasGarantia" type="number" placeholder="Ejemplo: 23">
    </div>

    <div class="field">
      <label>Fecha de entrega</label>
      <input id="fechaEntrega" type="date">
    </div>

    <div class="field">
      <label>Fecha de caída</label>
      <input id="fechaCaida" type="date">
    </div>

    <button class="btn btn-primary" onclick="calcular()">Calcular reembolso 💞</button>
    <button class="btn btn-whatsapp" onclick="enviar()">Enviar cálculo al cliente 💬</button>
    <button class="btn btn-copy" onclick="copiar()">Copiar resultado 📋</button>

    <div class="result">
      <div class="result-main">
        Reembolso: <span id="resultado">$0.00</span>
      </div>

      <div class="status" id="estadoGarantia"></div>

      <div id="detalle" class="details">Aquí aparecerá el cálculo.</div>

      <div id="mensajeCompartir" class="mini-msg">Primero calcula el reembolso.</div>
    </div>
  </div>

  <div id="toast">Copiado 💖</div>

  <script>
    function dias(a,b){
      const i = new Date(a + "T00:00:00");
      const f = new Date(b + "T00:00:00");
      return Math.floor((f-i)/(1000*60*60*24));
    }

    function formatearFecha(fecha){
      const f = new Date(fecha + "T00:00:00");
      return f.toLocaleDateString("es-MX");
    }

    function mostrarToast(texto){
      const toast = document.getElementById("toast");
      toast.textContent = texto;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function lanzarConfeti(){
      const contenedor = document.getElementById("confetti");
      contenedor.innerHTML = "";
      const colores = ["#ff1493","#ff69b4","#ffc0cb","#ffffff","#111827"];

      for(let i = 0; i < 80; i++){
        const pieza = document.createElement("span");
        pieza.className = "confetti-piece";
        pieza.style.left = Math.random() * 100 + "vw";
        pieza.style.background = colores[Math.floor(Math.random() * colores.length)];
        pieza.style.width = (6 + Math.random() * 8) + "px";
        pieza.style.height = (10 + Math.random() * 14) + "px";
        pieza.style.borderRadius = Math.random() > 0.5 ? "999px" : "2px";
        pieza.style.animationDuration = (2.8 + Math.random() * 2.2) + "s";
        pieza.style.animationDelay = (Math.random() * 0.6) + "s";
        contenedor.appendChild(pieza);
      }

      setTimeout(() => {
        contenedor.innerHTML = "";
      }, 5500);
    }

    function calcular(){
      const precio = parseFloat(document.getElementById("precio").value);
      const plan = parseInt(document.getElementById("tiempoContratado").value);
      const garantia = parseInt(document.getElementById("diasGarantia").value);
      const entrega = document.getElementById("fechaEntrega").value;
      const caida = document.getElementById("fechaCaida").value;

      if(!precio || !plan || !garantia || !entrega || !caida){
        alert("Completa todos los campos 💖");
        return;
      }

      const usados = dias(entrega, caida);
      const valorDia = precio / plan;

      let faltantes = 0;
      let reembolso = 0;

      if(usados < garantia){
        faltantes = garantia - usados;
        reembolso = valorDia * faltantes;
        document.getElementById("estadoGarantia").textContent = "💗 Cayó dentro de garantía";
      }else{
        document.getElementById("estadoGarantia").textContent = "💔 Fuera de garantía";
      }

      document.getElementById("resultado").textContent = "$" + reembolso.toFixed(2);

      document.getElementById("detalle").textContent =
        "Días usados: " + usados + "\n" +
        "Días garantía: " + garantia + "\n" +
        "Días faltantes garantía: " + faltantes + "\n" +
        "Valor por día: $" + valorDia.toFixed(2);

      document.getElementById("mensajeCompartir").textContent =
        "Hola 🎀\n" +
        "Este es tu cálculo de reembolso en Bonnie Shop:\n\n" +
        "Precio: $" + precio.toFixed(2) + "\n" +
        "Plan: " + plan + " días\n" +
        "Garantía: " + garantia + " días\n" +
        "Entrega: " + formatearFecha(entrega) + "\n" +
        "Caída: " + formatearFecha(caida) + "\n" +
        "Reembolso: $" + reembolso.toFixed(2) + "\n\n" +
        "Gracias por comprar en Bonnie Shop 💖";

      if(reembolso > 0){
        lanzarConfeti();
      }
    }

    function enviar(){
      const msg = document.getElementById("mensajeCompartir").textContent;

      if(!msg || msg === "Primero calcula el reembolso."){
        mostrarToast("Primero calcula el reembolso 💖");
        return;
      }

      window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
    }

    function copiar(){
      const texto = document.getElementById("mensajeCompartir").textContent;
      navigator.clipboard.writeText(texto);
      mostrarToast("Copiado 💖");
    }
  </script>

</body>
                                  </html>
