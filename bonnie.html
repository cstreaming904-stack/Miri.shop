<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:radial-gradient(circle at top,#fff0f7 0%,#ffd9ea 30%,#ffeef7 65%,#fff8fc 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:22px;
  color:#4b5563;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    radial-gradient(circle, rgba(255,255,255,.9) 0 2px, transparent 3px),
    radial-gradient(circle, rgba(255,105,180,.35) 0 2px, transparent 3px),
    radial-gradient(circle, rgba(255,182,193,.45) 0 2px, transparent 3px);
  background-size:120px 120px, 180px 180px, 220px 220px;
  background-position:10px 10px, 60px 40px, 120px 80px;
  animation:floatSparkles 14s linear infinite;
  opacity:.5;
}

@keyframes floatSparkles{
  0%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
  100%{transform:translateY(0);}
}

.card{
  width:100%;
  max-width:450px;
  background:rgba(255,255,255,0.96);
  border:4px solid #ffc1da;
  border-radius:34px;
  box-shadow:0 18px 45px rgba(255,20,147,0.16);
  padding:24px;
  position:relative;
  overflow:hidden;
  animation:cardPop .6s ease;
}

.card::before{
  content:"";
  position:absolute;
  inset:-40%;
  background:radial-gradient(circle, rgba(255,255,255,.45), transparent 55%);
  animation:shineMove 8s linear infinite;
  pointer-events:none;
}

@keyframes shineMove{
  0%{transform:translate(-30%,-30%) rotate(0deg);}
  100%{transform:translate(30%,30%) rotate(360deg);}
}

@keyframes cardPop{
  from{
    opacity:0;
    transform:translateY(18px) scale(.98);
  }
  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

.center{
  text-align:center;
}

.emoji{
  font-size:42px;
  margin-bottom:6px;
  animation:bounceCute 2s infinite;
}

@keyframes bounceCute{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-5px);}
}

h1{
  margin:0;
  color:#ff1493;
  font-size:30px;
  font-weight:900;
  text-shadow:0 2px 0 rgba(255,255,255,.7);
}

.phone{
  margin-top:6px;
  font-size:14px;
  font-weight:700;
}

.phone a{
  color:#111827;
  text-decoration:none;
}

.subtitle{
  margin-top:6px;
  color:#db2777;
  font-weight:700;
  font-size:16px;
}

.badge{
  display:inline-block;
  margin-top:10px;
  background:#ffe4f1;
  color:#db2777;
  font-weight:800;
  font-size:12px;
  padding:7px 12px;
  border-radius:999px;
  box-shadow:0 6px 14px rgba(236,72,153,.12);
}

.title2{
  margin-top:18px;
  color:#374151;
  font-size:28px;
  font-weight:900;
  text-align:center;
}

.field{
  margin-top:15px;
}

label{
  display:block;
  color:#ff1493;
  font-size:15px;
  font-weight:800;

}

input{
  width:100%;
  border:3px solid #ffc1da;
  background:#fff7fb;
  border-radius:20px;
  padding:15px;
  font-size:18px;
  outline:none;
  color:#374151;
  transition:.2s ease;
}

input:focus{
  border-color:#ff1493;
  box-shadow:0 0 0 4px rgba(255,20,147,.12);
  transform:translateY(-1px);
}

.date-box{
  position:relative;
}

.date-box input{
  padding-right:46px;
}

.icono{
  position:absolute;

}

.btn{
  width:100%;
  margin-top:18px;
  border:0;
  border-radius:22px;
  padding:16px;
  font-size:18px;
  font-weight:900;
  color:white;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
}

.btn::before{
  content:"";

}

.btn:hover::before,

}

@keyframes btnShine{
  from{left:-120%;}
  to{left:160%;}
}

.btn:hover,
.btn:active{
  transform:translateY(-2px) scale(1.01);
  filter:brightness(1.03);
}

.btn:active{

.btn-primary{

}

.btn-whatsapp{
  background:linear-gradient(90deg,#ff7bc3,#ff1493);
  box-shadow:0 14px 28px rgba(219,39,119,.22);
}

.btn-copy{
  background:linear-gradient(90deg,#ffb6d9,#ff69b4);

.btn-install{

}

.result{
  margin-top:22px;
  padding:18px;
  border-radius:24px;
  background:#fff8fc;
  border:3px solid #ffd6e8;
  text-align:center;
}

.result-main{
  font-size:22px;
  font-weight:800;

.result-main span{
  color:#ff1493;
  font-size:28px;
  font-weight:900;
}

.status{
  margin-top:10px;
  font-weight:800;
  color:#db2777;
}

.details{
  margin-top:12px;
  text-align:left;
  font-size:14px;
  white-space:pre-line;
  background:rgba(255,255,255,0.9);
  border-radius:16px;
  padding:13px;
}

.mini-msg{
  margin-top:12px;
  font-size:13px;
  text-align:left;
  white-space:pre-line;
  background:rgba(255,255,255,0.85);
  border-radius:16px;
  padding:12px;
}

.install-note{
  margin-top:10px;
  font-size:12px;
  color:#9ca3af;
  text-align:center;
}

#toast{
  position:fixed;
  left:50%;
  bottom:28px;
  transform:translateX(-50%);
  background:#ff1493;
  color:white;
  padding:12px 18px;
  border-radius:999px;
  font-weight:800;
  opacity:0;
  transition:.25s;
  z-index:99999;
}

#toast.show{
  opacity:1;
}

#splash-screen{
  position:fixed;
  inset:0;
  background:linear-gradient(180deg,#fff1f8,#ffe4f1);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  overflow:hidden;
}

.splash-content{
  text-align:center;
  animation:fadeUp .7s ease;
  position:relative;
  z-index:2;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(16px);}
  to{opacity:1; transform:translateY(0);}
}

.splash-logo{
  width:120px;
  height:120px;
  border-radius:28px;
  box-shadow:0 12px 30px rgba(0,0,0,0.15);
  margin-bottom:14px;
  object-fit:cover;
  animation:logoPulse 2s ease-in-out infinite;
}

@keyframes logoPulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.04);}
}

.splash-glow{
  position:absolute;
  inset:0;
  pointer-events:none;
  overflow:hidden;
}

.sparkle{
  position:absolute;
  width:10px;
  height:10px;
  background:white;
  border-radius:50%;
  opacity:.85;
  box-shadow:0 0 12px rgba(255,255,255,.9);
  animation:twinkle 2.6s infinite ease-in-out;
}

.sparkle::before,
.sparkle::after{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  background:rgba(255,255,255,.95);
  transform:translate(-50%,-50%);
  border-radius:10px;
}

.sparkle::before{
  width:2px;
  height:18px;
}

.sparkle::after{
  width:18px;
  height:2px;
}
