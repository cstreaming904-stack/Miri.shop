<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonnie Shop - Calculadora</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
margin:0;
background:linear-gradient(180deg,#ffc5e6 0%,#ff4fb3 50%,#111111 100%);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:430px;
background:white;
border-radius:30px;
padding:25px;
border:4px solid #ff9bd8;
box-shadow:0 0 20px rgba(255,20,147,.35);
}

.center{text-align:center;}

.logo{
position:relative;
margin-bottom:10px;
}

.logo img{
width:100%;
max-width:260px;
display:block;
margin:auto;
animation:flotar 4s ease-in-out infinite;
filter:drop-shadow(0 0 10px #ff69b4);
}

.logo::before,
.logo::after{
content:"✦";
position:absolute;
color:white;
font-size:20px;
animation:brillar 2s infinite;
}

.logo::before{left:40px;top:20px;}
.logo::after{right:40px;top:40px;}

@keyframes flotar{
0%{transform:translateY(0);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0);}
}

@keyframes brillar{
0%,100%{opacity:.2;transform:scale(.7);}
50%{opacity:1;transform:scale(1.2);}
}

/* CONTENEDOR DEL TITULO */

.titulo{
font-size:26px;
font-weight:900;
margin:0;
white-space:nowrap;
display:flex;
align-items:center;
justify-content:center;
gap:6px;
}

/* TEXTO METALICO */

.titulo-texto{

background:linear-gradient(
180deg,
#ffffff 0%,
#f9a8d4 25%,
#ff1493 45%,
#c026d3 65%,
#000000 90%
);

-webkit-background-clip:text;
background-clip:text;
color:transparent;

text-shadow:
0 2px 6px rgba(255,20,147,0.5),
0 0 12px rgba(255,255,255,0.6),
0 0 18px rgba(255,20,147,0.4);
}

/* MOÑITOS */

.bow{
font-size:22px;
animation:bowFloat 2.2s ease-in-out infinite;
position:relative;
filter:drop-shadow(0 0 4px #ff69b4);
}

.bow::after{
content:"✦";
position:absolute;
top:-6px;
right:-4px;
font-size:10px;
color:white;
text-shadow:
0 0 6px white,
0 0 10px #ffd6ec;
animation:sparkle 1.6s infinite;
}

@keyframes bowFloat{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-2px)}
}

@keyframes sparkle{
0%,100%{opacity:.2;transform:scale(.7)}
50%{opacity:1;transform:scale(1.2)}
}

.numero{
margin-top:6px;
font-weight:bold;
}

.numero a{
color:#ff1493;
text-decoration:none;
}

.subtitulo{
margin-top:6px;
font-weight:bold;
color:#b83280;
}

.badge{
display:inline-block;
background:#ffd6ec;
padding:8px 15px;
border-radius:20px;
margin-top:10px;
font-weight:bold;
color:#db2777;
}

h2{
text-align:center;
margin-top:20px;
}

.field{margin-top:14px;}

label{
font-weight:bold;
color:#ff1493;
display:block;
margin-bottom:6px;
}

input{
width:100%;
padding:15px;
border-radius:20px;
border:3px solid #ffc2e5;
background:#fff0f8;
font-size:16px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:30px;
margin-top:15px;
font-size:17px;
font-weight:bold;
color:white;
cursor:pointer;
position:relative;
overflow:hidden;
background:linear-gradient(90deg,#ff6aa9,#ff1493,#000);
box-shadow:0 6px 15px rgba(0,0,0,.35);
}

button::after{
content:"";
position:absolute;
top:0;
left:-120%;
width:60%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);
transform:skewX(-25deg);
animation:shine 3s infinite;
}

@keyframes shine{
0%{left:-120%;}
50%{left:150%;}
100%{left:150%;}
}

.btn2{
background:linear-gradient(90deg,#8a6aff,#ff1493,#000);
}

.btn3{
background:linear-gradient(90deg,#ffb6d9,#ff69b4,#6b214f);
}

.result{
margin-top:20px;
padding:18px;
border-radius:20px;
background:#fff0f8;
border:3px solid #ffc2e5;
}

.result-main{
text-align:center;
font-size:26px;
font-weight:bold;
}

.result-main span{
color:#ff1493;
}

#estado{
text-align:center;
margin-top:10px;
font-weight:bold;
color:#d946ef;
}

.details,
.mensaje{
background:white;
border-radius:15px;
padding:12px;
margin-top:10px;
white-space:pre-line;
}

.confetti{
position:fixed;
width:8px;
height:12px;
animation:caer 3s linear forwards;
pointer-events:none;
}

@keyframes caer{
0%{transform:translateY(-10px);}
100%{transform:translateY(100vh) rotate(720deg);}
}

</style>
</head>

<body>

<div class="card">

<div class="center">

<div class="logo">
<img src="logo-bonnie.png">
</div>

<div class="titulo">
<span class="bow">🎀</span>
<span class="titulo-texto">BONNIE SHOP</span>
<span class="bow">🎀</span>
</div>

<div class="numero">
📱 <a href="https://wa.me/527441658520">+52 744 165 8520</a>
</div>

<div class="subtitulo">
Calculadora de reembolsos
</div>

<div class="badge">
🐰 Bonita, rápida y fácil 🐰
</div>

</div>
